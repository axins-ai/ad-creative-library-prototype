<!DOCTYPE html>
<!-- v20260630-1430：修复生产工作台双菜单+视图泄漏，添加保存到原料库按钮 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>素材中心</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);--shadow-l:0 12px 40px rgba(0,0,0,.15);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased;display:flex}

/* ===== 左侧菜单 ===== */
.sidebar{
  width:220px;min-width:220px;height:100vh;
  background:var(--bg-card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.sidebar .logo{
  height:52px;display:flex;align-items:center;gap:8px;
  padding:0 18px;font-size:15px;font-weight:700;color:var(--primary);
  border-bottom:1px solid var(--border-light);flex-shrink:0;
}
.sidebar .logo .icon{font-size:20px}
.sidebar .menu-area{flex:1;overflow-y:auto;padding:8px 0}

.menu-group{margin-bottom:4px}
.menu-group-title{
  padding:6px 18px;font-size:11px;font-weight:600;
  color:var(--text-3);text-transform:uppercase;letter-spacing:.3px;
}
.menu-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px 8px 16px;font-size:13px;color:var(--text-2);
  cursor:pointer;transition:all .15s;border-left:3px solid transparent;
  user-select:none;white-space:nowrap;
}
.menu-item:hover{background:var(--bg-hover);color:var(--text-1)}
.menu-item.active{
  background:var(--primary-light);color:var(--primary);
  border-left-color:var(--primary);font-weight:600;
}
.menu-item .mi-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center}
.menu-item .mi-label{flex:1;overflow:hidden;text-overflow:ellipsis}

/* 子菜单 */
.menu-item.sub{padding-left:38px;font-size:12px;border-left:3px solid transparent}
.menu-item.sub .mi-icon{width:16px;font-size:13px}
.menu-item.sub.active{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary)}
.menu-item.expandable .expand-icon{font-size:10px;color:var(--text-3);margin-left:auto;transition:transform .2s;width:16px;text-align:center;flex-shrink:0;cursor:pointer}
.menu-item.expandable.expanded .expand-icon{transform:rotate(90deg)}
.sub-menu-wrap{overflow:hidden;max-height:0;transition:max-height .25s ease}
.sub-menu-wrap.expanded{max-height:500px}
.menu-item.folder{padding-left:52px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:pointer;border-left:3px solid transparent;transition:all .15s}
.menu-item.folder:hover{background:var(--bg-hover)}
.menu-item.folder.active{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary)}
.menu-item.folder .mi-icon{width:14px;font-size:12px}

.sidebar .bottom-area{
  border-top:1px solid var(--border-light);padding:8px 0;flex-shrink:0;
}
.sidebar .user-info{
  display:flex;align-items:center;gap:8px;
  padding:8px 18px;font-size:12px;color:var(--text-3);
}

/* ===== 右侧内容区 ===== */
.main-area{
  flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;
}
.top-bar{
  height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;
  box-shadow:var(--shadow-s);flex-shrink:0;
}
.top-bar .page-title{font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.top-bar .tag{
  margin-left:4px;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:500;
  background:var(--primary-light);color:var(--primary);border:1px solid #bae0ff;
}
.content-frame{
  flex:1;border:none;width:100%;height:100%;
  background:var(--bg-page);
}
</style>
</head>
<body>

<!-- 左侧菜单 -->
<aside class="sidebar">
  <div class="logo">
    <span class="icon">🎬</span>
    <span>素材中心</span>
  </div>
  <div class="menu-area">
    <div class="menu-group">
      <div class="menu-group-title">素材中心</div>
      <div class="menu-item expandable expanded" onclick="toggleSubMenu(this)">
        <span class="mi-icon">📂</span>
        <span class="mi-label">原料库</span>
        <span class="expand-icon">▶</span>
      </div>
      <div class="sub-menu-wrap expanded" id="subMenu-原料库">
        <div class="menu-item sub active" data-target="原料库" onclick="switchMenu(this);setTimeout(function(){document.getElementById('contentFrame').contentWindow.location.reload()},100)">
          <span class="mi-icon">📂</span>
          <span class="mi-label">首页</span>
        </div>
        <div class="menu-item expandable expanded" onclick="event.stopPropagation()" style="padding-left:38px;font-size:12px;display:flex;align-items:center;gap:8px;cursor:default;border-left:3px solid transparent">
          <span class="mi-icon">📁</span>
          <span class="mi-label" style="font-size:11px;color:var(--text-3)">个人文件夹</span>
          <span style="margin-left:auto;font-size:10px;color:var(--primary);cursor:pointer" onclick="event.stopPropagation();createFolderFromMenu()">+</span>
        </div>
        <div id="folderMenuList" style="padding:0"></div>
      </div>
      <div class="menu-item" data-target="素材库" onclick="switchMenu(this)">
        <span class="mi-icon">📂</span>
        <span class="mi-label">素材库</span>
      </div>
      <div class="menu-item" data-target="生产工作台" onclick="switchMenu(this)">
        <span class="mi-icon">⚙️</span>
        <span class="mi-label">生产工作台</span>
      </div>
      <div class="menu-item" data-target="标签库" onclick="switchMenu(this)">
        <span class="mi-icon">🏷️</span>
        <span class="mi-label">标签库</span>
      </div>
      <div class="menu-item" data-target="素材报表" onclick="switchMenu(this)">
        <span class="mi-icon">📊</span>
        <span class="mi-label">素材报表 V1</span>
      </div>
      <div class="menu-item" data-target="素材报表V2" onclick="switchMenu(this)">
        <span class="mi-icon">📊</span>
        <span class="mi-label">素材报表 V2</span>
      </div>
    </div>
  </div>
  <div class="bottom-area">
    <div class="user-info">
      <span>👤</span>
      <span>杨鑫</span>
    </div>
  </div>
</aside>

<!-- 右侧内容区 -->
<div class="main-area">
  <div class="top-bar">
    <h1 class="page-title" id="pageTitle">
      原料库
      <span class="tag">原型预览</span>
    </h1>
  </div>
  <iframe class="content-frame" id="contentFrame" src=""></iframe>
</div>

<script>
var MENU_CONFIG = {
  "原料库":       { file: "原料库/原料库原型.html",       title: "原料库" },
  "素材库":       { file: "素材库/素材库原型.html",       title: "素材库" },
  "生产工作台": { file: "生产工作台/生产工作台原型.html", title: "生产工作台" },
  "素材报表":     { file: "素材报表V1/素材报表V1原型.html", title: "素材报表（V1 基础报表）" },
  "素材报表V2": { file: "素材报表V2/素材报表V2原型.html", title: "素材报表（V2）" },
  "标签库":       { file: "标签库/标签库原型.html",       title: "标签库" },
};

function switchMenu(el) {
  var items = document.querySelectorAll('.menu-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  el.classList.add('active');
  var key = el.getAttribute('data-target');
  var cfg = MENU_CONFIG[key];
  if (!cfg) return;
  var sep = cfg.file.indexOf('?') >= 0 ? '&' : '?';
  document.getElementById('contentFrame').src = cfg.file + sep + 'v=' + Date.now();
  document.getElementById('pageTitle').innerHTML = cfg.title + ' <span class="tag">原型预览</span>';
}

function toggleSubMenu(el) {
  el.classList.toggle('expanded');
  var wrap = document.getElementById('subMenu-原料库');
  if (wrap) wrap.classList.toggle('expanded');
}

// 文件夹菜单操作
function selectFolderFromMenu(fid) {
  var items = document.querySelectorAll('.menu-item, .menu-item.folder');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('active');
  var el = document.querySelector('.folder[data-fid="' + fid + '"]');
  if (el) el.classList.add('active');
  // 高亮原料库和子菜单
  document.querySelector('.expandable').classList.add('active');
  
  // 加载原料库并传folder参数
  var cfg = MENU_CONFIG['原料库'];
  if (!cfg) return;
  document.getElementById('contentFrame').src = cfg.file + '?v=' + Date.now() + '&folder=' + fid;
  document.getElementById('pageTitle').innerHTML = '原料库 <span class="tag">' + getFolderName(fid) + '</span>';
}

function getFolderName(fid) {
  var fw = document.getElementById('contentFrame').contentWindow;
  if (fw && fw.msFolders) {
    for (var i = 0; i < fw.msFolders.length; i++) {
      if (fw.msFolders[i].id === fid) return fw.msFolders[i].name;
    }
  }
  return '文件夹';
}

function createFolderFromMenu() {
  var name = prompt('请输入文件夹名称：');
  if (!name || !name.trim()) return;
  name = name.trim();
  var fw = document.getElementById('contentFrame').contentWindow;
  if (fw && fw.msFolders) {
    for (var i = 0; i < fw.msFolders.length; i++) {
      if (fw.msFolders[i].name === name) { alert('已存在同名文件夹'); return; }
    }
    fw.msFolders.push({id: Date.now(), name: name});
    fw.renderFolderBar();
    fw.renderMsGrid();
    renderFolderMenuList();
  }
}

function deleteFolderFromMenu(fid) {
  if (!confirm('确定删除该文件夹吗？')) return;
  var fw = document.getElementById('contentFrame').contentWindow;
  if (fw && fw.msFolders) {
    for (var j = 0; j < fw.msMaterials.length; j++) {
      if (fw.msMaterials[j].folderId === fid) fw.msMaterials[j].folderId = 0;
    }
    fw.msFolders = fw.msFolders.filter(function(f) { return f.id !== fid; });
    if (fw.selFolder === fid) fw.selFolder = null;
    fw.renderFolderBar();
    fw.renderMsGrid();
    renderFolderMenuList();
  }
}

function renderFolderMenuList() {
  var list = document.getElementById('folderMenuList');
  if (!list) return;
  var fw = document.getElementById('contentFrame').contentWindow;
  if (!fw || !fw.msFolders) { list.innerHTML = ''; return; }
  var html = '';
  for (var i = 0; i < fw.msFolders.length; i++) {
    var f = fw.msFolders[i];
    html += '<div class="menu-item folder" data-fid="' + f.id + '" onclick="selectFolderFromMenu(' + f.id + ')">' +
      '<span class="mi-icon">📁</span>' +
      '<span class="mi-label">' + f.name + '</span>' +
      '<span style="font-size:10px;color:var(--text-3);cursor:pointer" onclick="event.stopPropagation();deleteFolderFromMenu(' + f.id + ')">✕</span>' +
      '</div>';
  }
  if (html === '') html = '<div class="menu-item folder" style="cursor:default;opacity:.5"><span class="mi-icon">📁</span><span>暂无</span></div>';
  list.innerHTML = html;
}

// iframe加载后同步文件夹列表
document.getElementById('contentFrame').addEventListener('load', function() {
  setTimeout(renderFolderMenuList, 300);
});

function updateMaterialTags(cfg) {
  var frame = document.getElementById('contentFrame');
  try {
    if (frame && frame.contentWindow && frame.contentWindow.updateMaterialTags) {
      frame.contentWindow.updateMaterialTags(cfg);
    }
  } catch (e) {}
}

// 默认加载第一个菜单
(function(){
  var first = document.querySelector('.menu-item');
  if (first) {
    first.classList.add('active');
    // 带时间戳加载默认页面
    var key = first.getAttribute('data-target');
    var cfg = MENU_CONFIG[key];
    if (cfg) {
      var sep = cfg.file.indexOf('?') >= 0 ? '&' : '?';
      document.getElementById('contentFrame').src = cfg.file + sep + 'v=' + Date.now();
    }
  }
})();
</script>

</body>
</html>
