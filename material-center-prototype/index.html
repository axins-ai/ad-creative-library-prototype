<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材中心</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);--shadow-l:0 12px 40px rgba(0,0,0,.15);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;margin:0;padding:0}

.nav-bar{
  height:56px;background:linear-gradient(135deg,#1664ff,#0952d9);
  display:flex;align-items:center;padding:0 24px;
  box-shadow:var(--shadow-m);position:sticky;top:0;z-index:100;flex-shrink:0;
}
.nav-bar .logo{color:#fff;font-size:18px;font-weight:700;margin-right:32px;display:flex;align-items:center;gap:8px}
.nav-bar .logo .icon{font-size:22px}
.nav-bar .menu{display:flex;gap:0;flex:1}
.nav-bar .menu-item{
  padding:8px 16px;color:rgba(255,255,255,.75);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .15s;border-radius:var(--radius-s);
  text-decoration:none;display:flex;align-items:center;gap:6px;
}
.nav-bar .menu-item:hover{color:#fff;background:rgba(255,255,255,.1)}
.nav-bar .menu-item.active{color:#fff;background:rgba(255,255,255,.15);font-weight:600}

.sub-nav{
  height:44px;background:var(--bg-card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;gap:0;
  box-shadow:var(--shadow-s);position:sticky;top:56px;z-index:99;flex-shrink:0;
}
.sub-nav .sub-item{
  padding:10px 18px;font-size:13px;color:var(--text-2);font-weight:500;
  cursor:pointer;transition:all .15s;border-bottom:2px solid transparent;
  text-decoration:none;white-space:nowrap;
}
.sub-nav .sub-item:hover{color:var(--primary)}
.sub-nav .sub-item.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}

.main-content{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px;min-height:calc(100vh - 100px);
}
.welcome-card{
  background:var(--bg-card);border-radius:var(--radius-l);
  box-shadow:var(--shadow-m);padding:48px 56px;max-width:680px;width:100%;
  text-align:center;
}
.welcome-card .icon{font-size:64px;margin-bottom:20px;display:block}
.welcome-card h2{font-size:22px;font-weight:700;color:var(--text-1);margin-bottom:12px}
.welcome-card p{font-size:14px;color:var(--text-2);line-height:1.8;margin-bottom:28px}
.feature-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-top:28px}
.feature-card{
  background:var(--bg-page);border:1px solid var(--border-light);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:all .2s;text-align:left;
}
.feature-card:hover{border-color:var(--primary);box-shadow:var(--shadow-s);transform:translateY(-2px)}
.feature-card .f-icon{font-size:28px;margin-bottom:10px;display:block}
.feature-card h3{font-size:14px;font-weight:600;color:var(--text-1);margin-bottom:6px}
.feature-card p{font-size:12px;color:var(--text-3);line-height:1.6}
</style>
</head>
<body>

<nav class="nav-bar">
  <div class="logo"><span class="icon">🎬</span> 素材中心</div>
  <div class="menu">
    <a class="menu-item" href="index.html">🏠 首页</a>
    <a class="menu-item active" href="index.html">📁 素材管理</a>
    <a class="menu-item" href="#">📊 数据报表</a>
    <a class="menu-item" href="#">⚙️ 系统设置</a>
  </div>
</nav>

<nav class="sub-nav">
  <a class="sub-item" href="原料库/原料库原型.html">🗂 原料库</a>
  <a class="sub-item" href="素材库/素材库原型.html">📂 素材库</a>
  <a class="sub-item active" href="生产工作台/生产工作台原型.html">⚙️ 生产工作台</a>
  <a class="sub-item" href="素材报表/素材报表原型.html">📊 素材报表</a>
</nav>

<main class="main-content">
  <div class="welcome-card">
    <span class="icon">🎬</span>
    <h2>欢迎使用素材中心</h2>
    <p>请通过上方二级菜单选择功能模块</p>
    <div class="feature-grid">
      <div class="feature-card" onclick="location.href='原料库/原料库原型.html'">
        <span class="f-icon">🗂</span>
        <h3>原料库</h3>
        <p>管理视频原料，支持上传、编辑、删除、标签筛选</p>
      </div>
      <div class="feature-card" onclick="location.href='素材库/素材库原型.html'">
        <span class="f-icon">📂</span>
        <h3>素材库</h3>
        <p>管理成品素材，支持导出、标签管理</p>
      </div>
      <div class="feature-card" onclick="location.href='生产工作台/生产工作台原型.html'">
        <span class="f-icon">⚙️</span>
        <h3>生产工作台</h3>
        <p>创建生产任务，配置参数，批量生成素材</p>
      </div>
      <div class="feature-card" onclick="location.href='素材报表/素材报表原型.html'">
        <span class="f-icon">📊</span>
        <h3>素材报表</h3>
        <p>查看素材数据报表和统计分析</p>
      </div>
    </div>
  </div>
</main>

</body>
</html>
