<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材中心 - 标签库</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;margin:0;padding:0}
.main-content{flex:1;display:flex;flex-direction:column;padding:16px 20px;gap:12px;min-height:0;overflow:auto}
.tag-card{background:var(--bg-card);border-radius:var(--radius-l);padding:12px 14px;box-shadow:var(--shadow-s);flex-shrink:0;}
.tag-tabs{display:flex;gap:8px;border-bottom:1px solid var(--border-light);padding-bottom:10px;margin-bottom:12px}
.tag-tab{height:30px;padding:0 12px;border-radius:var(--radius-s);border:1px solid var(--border);background:#fff;color:var(--text-2);font-size:12px;cursor:pointer;transition:all .2s}
.tag-tab:hover{background:var(--bg-hover);color:var(--text-1)}
.tag-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tag-section{display:none}
.tag-section.active{display:block}
.tag-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:10px;flex-wrap:wrap}
.tag-toolbar .title{font-size:13px;font-weight:600;color:var(--text-1)}
.tag-toolbar .desc{font-size:11px;color:var(--text-3)}
.ms-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:30px;padding:0 12px;border:none;border-radius:var(--radius-s);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap;}
.ms-btn-primary{background:var(--primary);color:#fff}
.ms-btn-primary:hover{background:var(--primary-dark)}
.ms-btn-outline{background:#fff;color:var(--text-2);border:1px solid var(--border)}
.ms-btn-outline:hover{background:var(--bg-hover);color:var(--text-1)}
.ms-btn-danger{background:#fff;color:var(--danger);border:1px solid #ffccc7}
.ms-btn-danger:hover{background:#fff1f0}
.tag-table{width:100%;border-collapse:collapse;font-size:12px}
.tag-table th,.tag-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border-light)}
.tag-table th{font-weight:600;color:var(--text-3);background:#fafafa;font-size:11px}
.tag-table tr:hover{background:var(--bg-hover)}
.tag-pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:12px;background:#f0f2f5;color:var(--text-2);border:1px solid var(--border-light);margin-right:4px}
.tag-empty{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px}

.ms-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.ms-modal-overlay.show{opacity:1;pointer-events:auto}
.ms-modal{background:var(--bg-card);border-radius:var(--radius-l);box-shadow:var(--shadow-m);width:420px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s;}
.ms-modal-overlay.show .ms-modal{transform:translateY(0)}
.ms-modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.ms-modal-hd h3{font-size:15px;font-weight:600}
.ms-modal-hd .close-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:var(--radius-s);color:var(--text-3);font-size:18px;transition:all .2s;}
.ms-modal-hd .close-btn:hover{background:var(--bg-hover);color:var(--text-1)}
.ms-modal-bd{padding:16px 20px;overflow-y:auto;flex:1}
.ms-modal-ft{display:flex;justify-content:flex-end;gap:10px;padding:12px 20px;border-top:1px solid var(--border-light);flex-shrink:0;}
.ms-fm-group{margin-bottom:14px}
.ms-fm-group label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px}
.ms-fm-group input,.ms-fm-group select{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-s);outline:none;transition:border .2s;font-family:var(--font);}
.ms-fm-group input:focus,.ms-fm-group select:focus{border-color:var(--primary)}

.toast-container{position:fixed;top:64px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--radius);font-size:13px;box-shadow:var(--shadow-m);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;max-width:320px;}
.toast-success{background:#f6ffed;border:1px solid #b7eb8f;color:var(--success)}
.toast-warning{background:#fffbe6;border:1px solid #ffe58f;color:var(--warning)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<main class="main-content">
  <div class="tag-card">
    <div class="tag-tabs">
      <button class="tag-tab active" data-tab="user" onclick="switchTab('user')">用户标签</button>
      <button class="tag-tab" data-tab="product" onclick="switchTab('product')">产品标签</button>
      <button class="tag-tab" data-tab="content" onclick="switchTab('content')">内容标签</button>
    </div>

    <!-- 用户标签 -->
    <div class="tag-section active" id="sec-user">
      <div class="tag-toolbar">
        <div><div class="title">用户标签</div></div>
        <button class="ms-btn ms-btn-primary" onclick="openUserModal()">+ 新增标签类型</button>
      </div>
      <div id="userTableWrap"></div>
    </div>

    <!-- 产品标签 -->
    <div class="tag-section" id="sec-product">
      <div class="tag-toolbar">
        <div><div class="title">产品标签</div></div>
        <button class="ms-btn ms-btn-primary" onclick="openProductModal()">+ 新增选项</button>
      </div>
      <div id="productTableWrap"></div>
    </div>

    <!-- 内容标签 -->
    <div class="tag-section" id="sec-content">
      <div class="tag-toolbar">
        <div><div class="title">内容标签</div><div class="desc">中段/中后段/尾帧共用同一套标签</div></div>
        <div style="display:flex;gap:8px;align-items:center">
          <select id="contentMatType" onchange="renderContentTable()" style="height:30px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:12px">
            <option value="前贴">前贴</option>
            <option value="中段_共用">中段、尾帧、中后段（共用）</option>
          </select>
          <button class="ms-btn ms-btn-primary" onclick="openContentTypeModal()">+ 新增标签类型</button>
        </div>
      </div>
      <div id="contentTableWrap"></div>
    </div>
  </div>
</main>

<!-- 用户标签类型弹窗（新增/编辑标签类型名称） -->
<div class="ms-modal-overlay" id="userModalOverlay" onclick="closeUserModal(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd"><h3 id="userModalTitle">新增标签类型</h3><button class="close-btn" onclick="closeUserModal()">×</button></div>
    <div class="ms-modal-bd">
      <div class="ms-fm-group">
        <label>标签类型名称</label>
        <input type="text" id="userModalName" placeholder="例如：地区">
      </div>
    </div>
    <div class="ms-modal-ft">
      <button class="ms-btn ms-btn-outline" onclick="closeUserModal()">取消</button>
      <button class="ms-btn ms-btn-primary" onclick="saveUserTag()">保存</button>
    </div>
  </div>
</div>

<!-- 用户标签选项弹窗（新增选项） -->
<div class="ms-modal-overlay" id="userOptionModalOverlay" onclick="closeUserOptionModal(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd"><h3 id="userOptionModalTitle">新增选项</h3><button class="close-btn" onclick="closeUserOptionModal()">×</button></div>
    <div class="ms-modal-bd">
      <div class="ms-fm-group">
        <label>选项名称</label>
        <input type="text" id="userOptionInput" placeholder="例如：一线城市">
      </div>
    </div>
    <div class="ms-modal-ft">
      <button class="ms-btn ms-btn-outline" onclick="closeUserOptionModal()">取消</button>
      <button class="ms-btn ms-btn-primary" onclick="saveUserOption()">保存</button>
    </div>
  </div>
</div>

<!-- 产品标签弹窗 -->
<div class="ms-modal-overlay" id="productModalOverlay" onclick="closeProductModal(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd"><h3 id="productModalTitle">新增选项</h3><button class="close-btn" onclick="closeProductModal()">×</button></div>
    <div class="ms-modal-bd">
      <div class="ms-fm-group">
        <label>选项名称</label>
        <input type="text" id="productModalInput" placeholder="例如：39元">
      </div>
    </div>
    <div class="ms-modal-ft">
      <button class="ms-btn ms-btn-outline" onclick="closeProductModal()">取消</button>
      <button class="ms-btn ms-btn-primary" onclick="saveProductOption()">保存</button>
    </div>
  </div>
</div>

<!-- 内容标签类型弹窗 -->
<div class="ms-modal-overlay" id="contentTypeModalOverlay" onclick="closeContentTypeModal(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd"><h3 id="contentTypeModalTitle">新增标签类型</h3><button class="close-btn" onclick="closeContentTypeModal()">×</button></div>
    <div class="ms-modal-bd">
      <div class="ms-fm-group">
        <label>标签类型名称</label>
        <input type="text" id="contentTypeInput" placeholder="例如：文案">
      </div>
    </div>
    <div class="ms-modal-ft">
      <button class="ms-btn ms-btn-outline" onclick="closeContentTypeModal()">取消</button>
      <button class="ms-btn ms-btn-primary" onclick="saveContentType()">保存</button>
    </div>
  </div>
</div>

<!-- 内容标签选项弹窗 -->
<div class="ms-modal-overlay" id="contentOptionModalOverlay" onclick="closeContentOptionModal(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd"><h3 id="contentOptionModalTitle">新增选项</h3><button class="close-btn" onclick="closeContentOptionModal()">×</button></div>
    <div class="ms-modal-bd">
      <div class="ms-fm-group">
        <label>选项名称</label>
        <input type="text" id="contentOptionInput" placeholder="例如：紧迫性">
      </div>
    </div>
    <div class="ms-modal-ft">
      <button class="ms-btn ms-btn-outline" onclick="closeContentOptionModal()">取消</button>
      <button class="ms-btn ms-btn-primary" onclick="saveContentOption()">保存</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
var DEFAULT_TAGS = {
  user: {
    "地区": ["一线城市", "二线城市", "三四线城市", "农村"],
    "年龄": ["18-24", "25-34", "35-44", "45+"],
    "性别": ["男", "女"]
  },
  product: ["39元", "59元"],
  content: {
    "前贴": {
      "文案": ["紧迫性", "系统通知"],
      "内容": ["风景", "猛宠", "花鸟"]
    },
    "中段_共用": {
      "文案": ["紧迫性", "系统通知"],
      "宣传卖点": ["话费", "流量"],
      "场景": ["营业厅", "公园", "小区", "街头"],
      "对话": ["老年男人", "老年女人"],
      "口播": ["口播女", "口播男"]
    }
  }
};

function loadTags() {
  try {
    var raw = localStorage.getItem("materialTags");
    if (raw) {
      var tags = JSON.parse(raw);
      // 数据迁移：product 对象格式 → 数组格式
      if (!Array.isArray(tags.product)) {
        var oldProduct = tags.product;
        tags.product = [];
        for (var k in oldProduct) {
          if (oldProduct.hasOwnProperty(k)) {
            for (var i = 0; i < oldProduct[k].length; i++) {
              tags.product.push(oldProduct[k][i]);
            }
          }
        }
      }
      // 数据迁移：中段/尾帧/中后段 合并为共用配置
      if (tags.content) {
        if (tags.content["中段"] && !tags.content["中段_共用"]) {
          tags.content["中段_共用"] = tags.content["中段"];
        }
        delete tags.content["中段"];
        delete tags.content["尾帧"];
        delete tags.content["中后段"];
      }
      return tags;
    }
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEFAULT_TAGS));
}

function saveTags() {
  localStorage.setItem("materialTags", JSON.stringify(TAGS));
  syncToOpener();
}

var TAGS = loadTags();
var userEditingKey = null;
var userEditingOptionIdx = -1;
var productEditingIdx = -1;
var contentEditingType = null;
var contentEditingOptionIdx = -1;

function switchTab(tab) {
  var tabs = document.querySelectorAll('.tag-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.querySelector('.tag-tab[data-tab="' + tab + '"]').classList.add('active');
  var secs = document.querySelectorAll('.tag-section');
  for (var i = 0; i < secs.length; i++) secs[i].classList.remove('active');
  document.getElementById('sec-' + tab).classList.add('active');
  if (tab === 'user') renderUserTable();
  if (tab === 'product') renderProductTable();
  if (tab === 'content') renderContentTable();
}

/* ===== 用户标签 ===== */
function renderUserTable() {
  var wrap = document.getElementById('userTableWrap');
  var html = '<table class="tag-table"><thead><tr><th style="width:160px">标签类型</th><th>选项</th><th style="width:140px">操作</th></tr></thead><tbody>';
  var has = false;
  for (var k in TAGS.user) {
    if (!TAGS.user.hasOwnProperty(k)) continue;
    has = true;
    var opts = TAGS.user[k].map(function(o, idx){
      return '<span class="tag-pill">' + o + ' <a href="javascript:void(0)" onclick="deleteUserOption(\'' + k + '\',' + idx + ')" style="color:var(--danger);margin-left:2px;text-decoration:none">×</a></span>';
    }).join('');
    html += '<tr>' +
      '<td><strong>' + k + '</strong></td>' +
      '<td>' + opts + ' <button class="ms-btn ms-btn-outline" style="height:22px;padding:0 6px;font-size:11px" onclick="openUserOptionModal(\'' + k + '\')">+</button></td>' +
      '<td>' +
        '<div style="display:flex;gap:6px">' +
        '<button class="ms-btn ms-btn-outline" style="height:26px;padding:0 8px" onclick="editUserTag(\'' + k + '\')">编辑</button>' +
        '<button class="ms-btn ms-btn-danger" style="height:26px;padding:0 8px" onclick="deleteUserTag(\'' + k + '\')">删除</button>' +
        '</div>' +
      '</td>' +
      '</tr>';
  }
  html += '</tbody></table>';
  if (!has) html = '<div class="tag-empty">暂无用户标签，请点击右上角新增</div>';
  wrap.innerHTML = html;
}

function openUserModal() {
  userEditingKey = null;
  document.getElementById('userModalTitle').textContent = '新增标签类型';
  document.getElementById('userModalName').value = '';
  document.getElementById('userModalOverlay').classList.add('show');
}
function closeUserModal(e) {
  if (e && e.target !== document.getElementById('userModalOverlay')) return;
  document.getElementById('userModalOverlay').classList.remove('show');
}
function editUserTag(key) {
  userEditingKey = key;
  document.getElementById('userModalTitle').textContent = '编辑标签类型';
  document.getElementById('userModalName').value = key;
  document.getElementById('userModalOverlay').classList.add('show');
}
function saveUserTag() {
  var name = document.getElementById('userModalName').value.trim();
  if (!name) { showToast('请输入标签类型名称', 'warning'); return; }
  if (userEditingKey && userEditingKey !== name) {
    TAGS.user[name] = TAGS.user[userEditingKey];
    delete TAGS.user[userEditingKey];
  } else if (!TAGS.user[name]) {
    TAGS.user[name] = [];
  }
  saveTags();
  closeUserModal();
  renderUserTable();
  showToast('保存成功', 'success');
}
function deleteUserTag(key) {
  if (!confirm('确定删除「' + key + '」及其所有选项？')) return;
  delete TAGS.user[key];
  saveTags();
  renderUserTable();
  showToast('删除成功', 'success');
}

function openUserOptionModal(tagType) {
  userEditingKey = tagType;
  userEditingOptionIdx = -1;
  document.getElementById('userOptionModalTitle').textContent = '新增「' + tagType + '」选项';
  document.getElementById('userOptionInput').value = '';
  document.getElementById('userOptionModalOverlay').classList.add('show');
}
function closeUserOptionModal(e) {
  if (e && e.target !== document.getElementById('userOptionModalOverlay')) return;
  document.getElementById('userOptionModalOverlay').classList.remove('show');
}
function saveUserOption() {
  var val = document.getElementById('userOptionInput').value.trim();
  if (!val) { showToast('请输入选项名称', 'warning'); return; }
  var arr = TAGS.user[userEditingKey];
  if (arr.indexOf(val) > -1) { showToast('该选项已存在', 'warning'); return; }
  arr.push(val);
  saveTags();
  closeUserOptionModal();
  renderUserTable();
  showToast('新增成功', 'success');
}
function deleteUserOption(tagType, idx) {
  if (!confirm('确定删除该选项？')) return;
  TAGS.user[tagType].splice(idx, 1);
  saveTags();
  renderUserTable();
  showToast('删除成功', 'success');
}

/* ===== 产品标签 ===== */
function renderProductTable() {
  var wrap = document.getElementById('productTableWrap');
  if (TAGS.product.length === 0) {
    wrap.innerHTML = '<div class="tag-empty">暂无产品标签，请点击右上角新增</div>';
    return;
  }
  var html = '<table class="tag-table"><thead><tr><th>选项</th><th style="width:100px">操作</th></tr></thead><tbody>';
  for (var i = 0; i < TAGS.product.length; i++) {
    html += '<tr>' +
      '<td><span class="tag-pill">' + TAGS.product[i] + '</span></td>' +
      '<td>' +
        '<div style="display:flex;gap:6px">' +
        '<button class="ms-btn ms-btn-outline" style="height:26px;padding:0 8px" onclick="editProductOption(' + i + ')">编辑</button>' +
        '<button class="ms-btn ms-btn-danger" style="height:26px;padding:0 8px" onclick="deleteProductOption(' + i + ')">删除</button>' +
        '</div>' +
      '</td>' +
      '</tr>';
  }
  html += '</tbody></table>';
  wrap.innerHTML = html;
}

function openProductModal(editIdx) {
  productEditingIdx = editIdx !== undefined ? editIdx : -1;
  if (productEditingIdx >= 0) {
    document.getElementById('productModalTitle').textContent = '编辑选项';
    document.getElementById('productModalInput').value = TAGS.product[productEditingIdx];
  } else {
    document.getElementById('productModalTitle').textContent = '新增选项';
    document.getElementById('productModalInput').value = '';
  }
  document.getElementById('productModalOverlay').classList.add('show');
}
function closeProductModal(e) {
  if (e && e.target !== document.getElementById('productModalOverlay')) return;
  document.getElementById('productModalOverlay').classList.remove('show');
}
function saveProductOption() {
  var val = document.getElementById('productModalInput').value.trim();
  if (!val) { showToast('请输入选项名称', 'warning'); return; }
  if (productEditingIdx >= 0) {
    var old = TAGS.product[productEditingIdx];
    if (val !== old && TAGS.product.indexOf(val) > -1) { showToast('该选项已存在', 'warning'); return; }
    TAGS.product[productEditingIdx] = val;
  } else {
    if (TAGS.product.indexOf(val) > -1) { showToast('该选项已存在', 'warning'); return; }
    TAGS.product.push(val);
  }
  saveTags();
  closeProductModal();
  renderProductTable();
  showToast('保存成功', 'success');
}
function editProductOption(idx) {
  openProductModal(idx);
}
function deleteProductOption(idx) {
  if (!confirm('确定删除「' + TAGS.product[idx] + '」？')) return;
  TAGS.product.splice(idx, 1);
  saveTags();
  renderProductTable();
  showToast('删除成功', 'success');
}

/* ===== 内容标签 ===== */
function renderContentTable() {
  var matType = document.getElementById('contentMatType').value;
  var contentKey = matType;
  var wrap = document.getElementById('contentTableWrap');

  var sharedNote = '';
  if (matType === '中段_共用') {
    sharedNote = '<div style="padding:8px 12px;margin-bottom:10px;background:#e8f1ff;border-radius:var(--radius-s);font-size:12px;color:var(--primary-dark)">当前编辑的是「中段、尾帧、中后段」共用的标签配置，修改将同步影响这三个原料类型。</div>';
  }

  var cfg = TAGS.content[contentKey] || {};
  var html = sharedNote;
  html += '<table class="tag-table"><thead><tr><th style="width:140px">标签类型</th><th>选项</th><th style="width:140px">操作</th></tr></thead><tbody>';
  var has = false;
  for (var k in cfg) {
    if (!cfg.hasOwnProperty(k)) continue;
    has = true;
    var opts = cfg[k].map(function(o, idx){
      return '<span class="tag-pill">' + o + ' <a href="javascript:void(0)" onclick="deleteContentOption(\'' + contentKey + '\',\'' + k + '\',' + idx + ')" style="color:var(--danger);margin-left:2px;text-decoration:none">×</a></span>';
    }).join('');
    html += '<tr>' +
      '<td><strong>' + k + '</strong></td>' +
      '<td>' + opts + ' <button class="ms-btn ms-btn-outline" style="height:22px;padding:0 6px;font-size:11px" onclick="openContentOptionModal(\'' + contentKey + '\',\'' + k + '\')">+</button></td>' +
      '<td>' +
        '<div style="display:flex;gap:6px">' +
        '<button class="ms-btn ms-btn-outline" style="height:26px;padding:0 8px" onclick="editContentType(\'' + contentKey + '\',\'' + k + '\')">编辑</button>' +
        '<button class="ms-btn ms-btn-danger" style="height:26px;padding:0 8px" onclick="deleteContentType(\'' + contentKey + '\',\'' + k + '\')">删除</button>' +
        '</div>' +
      '</td>' +
      '</tr>';
  }
  html += '</tbody></table>';
  if (!has) html = sharedNote + '<div class="tag-empty">暂无内容标签，请点击右上角新增</div>';
  wrap.innerHTML = html;
}

function openContentTypeModal() {
  contentEditingType = null;
  document.getElementById('contentTypeModalTitle').textContent = '新增标签类型';
  document.getElementById('contentTypeInput').value = '';
  document.getElementById('contentTypeModalOverlay').classList.add('show');
}
function closeContentTypeModal(e) {
  if (e && e.target !== document.getElementById('contentTypeModalOverlay')) return;
  document.getElementById('contentTypeModalOverlay').classList.remove('show');
}
function saveContentType() {
  var matType = document.getElementById('contentMatType').value;
  var contentKey = matType;
  var val = document.getElementById('contentTypeInput').value.trim();
  if (!val) { showToast('请输入标签类型名称', 'warning'); return; }
  if (!TAGS.content[contentKey]) TAGS.content[contentKey] = {};
  if (contentEditingType) {
    if (val !== contentEditingType && TAGS.content[contentKey][val]) { showToast('该标签类型已存在', 'warning'); return; }
    TAGS.content[contentKey][val] = TAGS.content[contentKey][contentEditingType];
    delete TAGS.content[contentKey][contentEditingType];
  } else {
    if (TAGS.content[contentKey][val]) { showToast('该标签类型已存在', 'warning'); return; }
    TAGS.content[contentKey][val] = [];
  }
  saveTags();
  closeContentTypeModal();
  renderContentTable();
  showToast('保存成功', 'success');
}
function editContentType(contentKey, oldType) {
  contentEditingType = oldType;
  document.getElementById('contentTypeModalTitle').textContent = '编辑标签类型';
  document.getElementById('contentTypeInput').value = oldType;
  document.getElementById('contentTypeModalOverlay').classList.add('show');
}
function deleteContentType(contentKey, typeName) {
  if (!confirm('确定删除「' + typeName + '」及其所有选项？')) return;
  delete TAGS.content[contentKey][typeName];
  saveTags();
  renderContentTable();
  showToast('删除成功', 'success');
}

function openContentOptionModal(contentKey, typeName) {
  contentEditingType = typeName;
  contentEditingOptionIdx = -1;
  document.getElementById('contentOptionModalTitle').textContent = '新增「' + typeName + '」选项';
  document.getElementById('contentOptionInput').value = '';
  document.getElementById('contentOptionModalOverlay').classList.add('show');
}
function closeContentOptionModal(e) {
  if (e && e.target !== document.getElementById('contentOptionModalOverlay')) return;
  document.getElementById('contentOptionModalOverlay').classList.remove('show');
}
function saveContentOption() {
  var val = document.getElementById('contentOptionInput').value.trim();
  if (!val) { showToast('请输入选项名称', 'warning'); return; }
  var arr = TAGS.content[contentEditingType.split(',')[0] ? contentEditingType : contentEditingType];
  // 简化：直接用 contentEditingType 作为 typeName
  var typeName = contentEditingType;
  var contentKey = document.getElementById('contentMatType').value;
  arr = TAGS.content[contentKey][typeName];
  if (arr.indexOf(val) > -1) { showToast('该选项已存在', 'warning'); return; }
  arr.push(val);
  saveTags();
  closeContentOptionModal();
  renderContentTable();
  showToast('新增成功', 'success');
}
function deleteContentOption(contentKey, typeName, idx) {
  if (!confirm('确定删除该选项？')) return;
  TAGS.content[contentKey][typeName].splice(idx, 1);
  saveTags();
  renderContentTable();
  showToast('删除成功', 'success');
}

function syncToOpener() {
  try {
    if (window.parent && window.parent !== window && window.parent.updateMaterialTags) {
      window.parent.updateMaterialTags(TAGS);
    }
  } catch (e) {}
}

function showToast(msg, type) {
  type = type || "info";
  var container = document.getElementById("toastContainer");
  var el = document.createElement("div");
  el.className = "toast toast-" + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, 2500);
}

renderUserTable();
</script>
</body>
</html>
