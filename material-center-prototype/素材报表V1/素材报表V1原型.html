<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材报表 V1 · 第二期（基础底表）</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);--shadow-l:0 12px 40px rgba(0,0,0,.15);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.25)}

.app-header{
  height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 24px;
  box-shadow:var(--shadow-s);position:sticky;top:0;z-index:100;flex-shrink:0;
}
.app-header .logo{display:flex;align-items:center;gap:10px;font-size:16px;font-weight:600;color:var(--text-1);letter-spacing:-.2px}
.app-header .logo svg{color:var(--primary)}

.main-content{flex:1;display:flex;flex-direction:column;padding:20px 24px;gap:16px;min-height:0;overflow:hidden}

.filter-card{
  background:var(--bg-card);border-radius:var(--radius-l);
  padding:10px 16px 8px;
  box-shadow:var(--shadow-s);border:1px solid var(--border-light);flex-shrink:0;
}
.filter-body{display:flex;flex-wrap:wrap;gap:6px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:3px;min-width:0}
.filter-group label{font-size:11px;color:var(--text-3);font-weight:500;padding-left:1px}
.filter-group input,
.filter-group select{
  height:30px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius-s);
  font-size:12px;color:var(--text-1);background:#fff;outline:none;transition:border .2s;
  min-width:0;
}
.filter-group input:focus,.filter-group select:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,100,255,.12)}
.filter-group input[type="date"]{width:128px;font-size:11px;padding:0 5px}
.filter-actions{display:flex;gap:6px;align-items:flex-end;padding-bottom:0}

.filter-group.search-group{width:160px;flex:none}
.filter-group.search-group input{width:160px}
.filter-group.id-group{width:120px;flex:none}
.filter-group.id-group input{width:120px}

.mode-toggle{display:flex;align-items:center;gap:3px;padding:3px;background:var(--bg-page);border-radius:var(--radius-s);height:30px}
.mode-toggle label{font-size:11px;color:var(--text-2);cursor:pointer;padding:3px 8px;border-radius:4px;transition:all .15s;user-select:none;line-height:1}
.mode-toggle label.active{background:#fff;color:var(--primary);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.mode-toggle input[type="radio"]{display:none}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:5px;
  height:30px;padding:0 10px;border-radius:var(--radius-s);font-size:12px;font-weight:500;
  border:1px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;
}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark);border-color:var(--primary-dark)}
.btn-outline{background:#fff;color:var(--text-2);border-color:var(--border)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-danger-outline{background:#fff;color:var(--danger);border-color:var(--danger)}
.btn-danger-outline:hover{background:#fff1f0}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:#73d13d}

.batch-bar{
  display:none;align-items:center;justify-content:space-between;
  background:var(--primary-light);border:1px solid rgba(22,100,255,.2);
  border-radius:var(--radius);padding:8px 16px;font-size:13px;color:var(--primary-dark);
  animation:fadeSlideIn .25s ease;flex-shrink:0;
}
.batch-bar.show{display:flex}
.batch-bar .batch-left{display:flex;align-items:center;gap:10px}
.batch-bar .batch-left strong{font-weight:600}

.table-card{
  background:var(--bg-card);border-radius:var(--radius-l);
  box-shadow:var(--shadow-s);border:1px solid var(--border-light);
  flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;
}
.table-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid var(--border-light);flex-shrink:0;
}
.table-toolbar .table-title{font-size:14px;font-weight:600;color:var(--text-1)}
.table-toolbar .table-actions{display:flex;gap:8px}
.table-scroll{flex:1;overflow:auto;min-height:0;}

table{width:100%;border-collapse:collapse;font-size:13px;min-width:max-content}
thead{position:sticky;top:0;z-index:2}
thead th{
  background:#fafbfc;font-weight:600;color:var(--text-2);
  padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);
  white-space:nowrap;font-size:12px;letter-spacing:.3px;
}
tbody td{
  padding:10px 14px;border-bottom:1px solid var(--border-light);
  white-space:nowrap;
}

tbody tr{cursor:default;transition:background .15s}
tbody tr:hover{background:var(--bg-hover)}
tbody tr.selected{background:var(--primary-light)}

.cell-thumb{
  width:64px;height:48px;object-fit:cover;border-radius:var(--radius-s);
  background:#f0f0f0;cursor:pointer;transition:transform .2s,box-shadow .2s;display:block;
}
.cell-thumb:hover{transform:scale(1.08);box-shadow:var(--shadow-m)}
.cell-name{color:var(--primary);cursor:pointer;font-weight:500}
.cell-name:hover{text-decoration:underline}
.cell-link{color:var(--primary);text-decoration:none;font-size:12px}
.cell-link:hover{text-decoration:underline}
.tag-inline{display:inline-block;padding:2px 8px;background:var(--primary-light);color:var(--primary);border-radius:4px;font-size:11px;margin:1px 2px}
.tag-type-img{background:#e6fffb;color:#13c2c2}
.tag-type-vid{background:#f6ffed;color:#52c41a}
    .tag-status-ok{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
    .tag-status-off{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;background:#f0f0f0;color:#999;border:1px solid #e8e8e8}
.status-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
.status-dot.on{background:var(--success)}
.status-dot.off{background:var(--warning)}
.mono{font-family:"SF Mono","Menlo",monospace;font-size:12px;color:var(--text-3)}
.action-btn{
  background:none;border:none;cursor:pointer;font-size:13px;padding:4px 10px;
  border-radius:var(--radius-s);transition:all .15s;white-space:nowrap;
}
.action-btn.edit{color:var(--primary)}
.action-btn.edit:hover{background:var(--primary-light)}
.action-btn.del{color:var(--danger)}
.action-btn.del:hover{background:#fff1f0}
.summary-hint{font-size:11px;color:var(--text-3);margin-left:4px}

.modal-mask{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;
  justify-content:center;align-items:center;animation:fadeIn .2s ease;
}
.modal-mask.show{display:flex}
.modal{
  background:var(--bg-card);border-radius:var(--radius-l);
  width:94%;max-width:680px;max-height:88vh;overflow:auto;
  box-shadow:var(--shadow-l);animation:scaleIn .25s ease;display:flex;flex-direction:column;
}
.modal-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;border-bottom:1px solid var(--border-light);flex-shrink:0;
}
.modal-hd h3{font-size:15px;font-weight:600}
.modal-close{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border:none;background:none;font-size:18px;color:var(--text-3);cursor:pointer;border-radius:var(--radius-s);transition:all .15s;
}
.modal-close:hover{background:var(--bg-hover);color:var(--text-1)}
.modal-bd{padding:20px;overflow-y:auto;flex:1}
.modal-ft{display:flex;justify-content:flex-end;gap:10px;padding:14px 20px;border-top:1px solid var(--border-light);flex-shrink:0;}

.fm-row{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.fm-group{flex:1;min-width:160px;display:flex;flex-direction:column;gap:5px}
.fm-group label{font-size:12px;font-weight:500;color:var(--text-2);padding-left:2px}
.fm-group label .req{color:var(--danger);margin-left:2px}
.fm-group input,.fm-group select,.fm-group textarea{
  height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);
  font-size:13px;color:var(--text-1);outline:none;transition:border .2s;width:100%;
}
.fm-group textarea{height:72px;padding:8px 10px;resize:vertical}
.fm-group input:focus,.fm-group select:focus,.fm-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,100,255,.12)}
.fm-group input[readonly]{background:#f5f5f5;color:var(--text-3);cursor:not-allowed}
.upload-zone{
  border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;
  cursor:pointer;transition:all .2s;margin-bottom:16px;
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light)}
.upload-zone .uz-icon{font-size:32px;margin-bottom:6px}
.upload-zone p{font-size:13px;color:var(--text-2)}

.col-group{margin-bottom:10px}
.col-group-title{
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--text-3);font-weight:500;
  margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border-light);
}
.col-group-title .group-actions{display:flex;gap:4px}
.col-group-title .group-actions button{font-size:11px;padding:2px 8px;height:22px;line-height:1;}
.col-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.col-item{display:flex;align-items:center;gap:8px;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius-s);cursor:pointer;transition:all .15s;}
.col-item:hover{border-color:var(--primary)}

.exp-opts{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:18px}
.exp-opt{
  border:2px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;
  cursor:pointer;transition:all .2s;
}
.exp-opt:hover,.exp-opt.selected{border-color:var(--primary);background:var(--primary-light)}
.exp-opt h4{font-size:14px;margin-bottom:6px;color:var(--text-1)}
.exp-opt p{font-size:12px;color:var(--text-3)}
.exp-col-section{margin-top:14px}
.exp-col-section h4{font-size:13px;font-weight:500;margin-bottom:8px;color:var(--text-2)}

.preview-modal .modal{max-width:740px}
.preview-body{padding:20px}
.preview-body img{width:100%;max-height:420px;object-fit:contain;border-radius:var(--radius);background:#000}
.preview-info{padding:16px 0}
.preview-info p{margin-bottom:8px;font-size:13px;line-height:1.6}

.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);
  background:#333;color:#fff;padding:10px 24px;border-radius:var(--radius);
  font-size:13px;z-index:2000;opacity:0;transition:all .3s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeSlideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
    素材库管理系统
  </div>
</header>

<main class="main-content">

  <div class="filter-card">
    <div class="filter-body">
      <div class="filter-group search-group">
        <label>素材名称</label>
        <input type="text" id="searchInput" placeholder="搜索素材名称…">
      </div>
      <div class="filter-group">
        <label>素材类型</label>
        <select id="typeFilter">
          <option value="">全部</option>
          <option>图片</option>
          <option>视频</option>
        </select>
      </div>
      <div class="filter-group">
        <label>业务归属</label>
        <select id="bizFilter">
          <option value="">全部</option>
          <option>存量</option>
          <option>权益</option>
        </select>
      </div>
      <div class="filter-group">
        <label>渠道</label>
        <select id="channelFilter">
          <option value="">全部渠道</option>
          <option>头条</option>
          <option>广点通</option>
        </select>
      </div>
      <div class="filter-group">
        <label>优化师</label>
        <select id="optimizerFilter">
          <option value="">全部</option>
          <option>张伟</option>
          <option>王芳</option>
          <option>刘强</option>
          <option>赵明</option>
        </select>
      </div>
      <div class="filter-group">
        <label>设计师</label>
        <select id="designerFilter">
          <option value="">全部</option>
          <option>李明</option>
          <option>陈晓</option>
          <option>赵丽</option>
        </select>
      </div>
      <div class="filter-group id-group">
        <label>账户ID</label>
        <input type="text" id="accountIdFilter" placeholder="输入账户ID">
      </div>
      <div class="filter-group id-group">
        <label>项目ID</label>
        <input type="text" id="projectIdFilter" placeholder="输入项目ID">
      </div>
      <div class="filter-group id-group">
        <label>广告ID</label>
        <input type="text" id="adIdFilter" placeholder="输入广告ID">
      </div>
      <div class="filter-group id-group">
        <label>素材ID</label>
        <input type="text" id="creativeIdFilter" placeholder="输入素材ID">
      </div>
      <div class="filter-group">
        <label>创建日期（起）</label>
        <input type="date" id="dateCreatedStart">
      </div>
      <div class="filter-group">
        <label>创建日期（止）</label>
        <input type="date" id="dateCreatedEnd">
      </div>
      <div class="filter-group">
        <label>数据范围（起）</label>
        <input type="date" id="dateRangeStart">
      </div>
      <div class="filter-group">
        <label>数据范围（止）</label>
        <input type="date" id="dateRangeEnd">
      </div>
      <div class="filter-group">
        <label>素材维度</label>
        <div class="mode-toggle" id="modeToggleMaterial" style="display:none">
          <input type="radio" id="modeDetail" name="mode" value="detail" checked>
          <label for="modeDetail" class="active" onclick="switchMode('detail')">明细</label>
          <input type="radio" id="modeSummary" name="mode" value="summary">
          <label for="modeSummary" onclick="switchMode('summary')">汇总</label>
        </div>
      </div>
      <div class="filter-group">
        <label>时间维度</label>
        <div class="mode-toggle" id="modeToggleTime" style="display:none">
          <input type="radio" id="timeDaily" name="time" value="daily">
          <label for="timeDaily" onclick="switchTimeMode('daily')">分天</label>
          <input type="radio" id="timeSummary" name="time" value="summary" checked>
          <label for="timeSummary" class="active" onclick="switchTimeMode('summary')">汇总</label>
        </div>
      </div>
      <div class="filter-actions">
        <button class="btn btn-primary" onclick="applyFilter()">🔍 筛选</button>
        <button class="btn btn-outline" onclick="resetFilters()">重置</button>
      </div>
    </div>
  </div>

  <div class="batch-bar" id="batchBar">
    <div class="batch-left">
      <strong>已选择 <span id="batchCount">0</span> 项</strong>
      <button class="btn btn-danger-outline" onclick="batchDelete()">🗑 批量删除</button>
    </div>
    <button class="btn btn-outline" onclick="clearSelection()">清除选择</button>
  </div>

  <div class="table-card" id="tableCard">
    <div class="table-toolbar">
      <div class="table-title">📊 素材报表 V1（基础底表）</div>
      <div class="table-actions">
        <button class="btn btn-outline" onclick="openUploadModal()">📷 上传素材</button>
        <button class="btn btn-outline" onclick="openColConfig()">⚙ 自定义列</button>
        <button class="btn btn-success" onclick="openExport()" style="display:none">📥 导出报表</button><!-- 第二期开放 -->
      </div>
    </div>
    <div class="table-scroll">
      <table>
        <thead><tr id="colHeaderRow"></tr></thead>
        <tbody id="tableBody">
          <tr><td colspan="99" style="text-align:center;padding:60px 20px;color:var(--text-3)">
            <p style="font-size:14px;margin-top:12px">暂无数据</p>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- Upload Modal -->
<div class="modal-mask" id="uploadMask">
  <div class="modal">
    <div class="modal-hd">
      <h3>📷 上传素材</h3>
      <button class="modal-close" onclick="closeModal('uploadMask')">×</button>
    </div>
    <div class="modal-bd">
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        <div class="uz-icon">📁</div>
        <p>点击选择文件，或拖拽文件到此处</p>
        <p style="font-size:11px;color:var(--text-3);margin-top:4px">支持 jpg/png/mp4 格式</p>
      </div>
      <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
      <div class="fm-row">
        <div class="fm-group">
          <label>素材名称 <span class="req">*</span></label>
          <input type="text" id="f_name" placeholder="输入素材名称">
        </div>
        <div class="fm-group">
          <label>素材类型 <span class="req">*</span></label>
          <select id="f_type">
            <option>图片</option>
            <option>视频</option>
          </select>
        </div>
      </div>
      <div class="fm-row">
        <div class="fm-group">
          <label>业务归属 <span class="req">*</span></label>
          <select id="f_biz">
            <option>存量</option>
            <option>权益</option>
          </select>
        </div>
        <div class="fm-group">
        <label>渠道 <span class="req">*</span></label>
        <select id="f_channel">
          <option>头条</option>
          <option>广点通</option>
        </select>
        </div>
      </div>
      <div class="fm-row">
        <div class="fm-group">
          <label>优化师 <span class="req">*</span></label>
          <select id="f_optimizer">
            <option>张伟</option>
            <option>王芳</option>
            <option>刘强</option>
            <option>赵明</option>
          </select>
        </div>
        <div class="fm-group">
          <label>设计师 <span class="req">*</span></label>
          <select id="f_designer">
            <option>李明</option>
            <option>陈晓</option>
            <option>赵丽</option>
          </select>
        </div>
      </div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal('uploadMask')">取消</button>
      <button class="btn btn-primary" onclick="submitUpload()">确认上传</button>
    </div>
  </div>
</div>

<!-- Column Config Modal -->
<div class="modal-mask" id="colMask">
  <div class="modal" style="max-width:560px">
    <div class="modal-hd">
      <h3>⚙ 自定义列显示</h3>
      <button class="modal-close" onclick="closeModal('colMask')">×</button>
    </div>
    <div class="modal-bd" id="colModalBody">
      <p style="font-size:13px;color:var(--text-3);margin-bottom:14px">选择需要在表格中显示的列</p>
      <div id="colGroups"></div>
    </div>
    <div class="modal-ft">
      <button class="btn btn-outline" onclick="closeModal('colMask')">取消</button>
      <button class="btn btn-primary" onclick="saveCols()">保存配置</button>
    </div>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-mask" id="exportMask">
  <div class="modal" style="max-width:560px">
    <div class="modal-hd">
      <h3>📥 导出数据报表</h3>
      <button class="modal-close" onclick="closeModal('exportMask')">×</button>
    </div>
    <div class="modal-bd">
      <div class="exp-opts">

function randomDate(){
  var start = new Date('2025-01-01');
  var end = new Date('2026-06-16');
  return new Date(start.getTime() + Math.random()*(end.getTime()-start.getTime())).toISOString().slice(0,10);
}
function randomMetrics(isVideo){
  var impressions = Math.floor(Math.random()*500000)+1000;
  var clicks = Math.floor(impressions*(0.01+Math.random()*0.08));
  var ctr = (clicks/impressions*100).toFixed(2);
  var cost = (Math.random()*10000).toFixed(2);
  var cpm = (parseFloat(cost) / impressions * 1000).toFixed(2);
  var conversions = Math.floor(clicks*(0.02+Math.random()*0.15));
  var cvr = (conversions/clicks*100).toFixed(2);
  var metrics = {
    impressions:impressions,
    clicks:clicks,
    ctr:ctr,
    cost:cost,
    cpm:cpm,
    conversions:conversions,
    cvr:cvr
  };
  if(isVideo){
    metrics.effectivePlays = Math.floor(clicks*(0.5+Math.random()*0.5));
    metrics.effectivePlayRate = (metrics.effectivePlays/impressions*100).toFixed(2);
    metrics.v3Count = Math.floor(impressions*(0.3+Math.random()*0.4));
    metrics.v3Rate = (metrics.v3Count/impressions*100).toFixed(2);
    metrics.v5Count = Math.floor(impressions*(0.25+Math.random()*0.35));
    metrics.v5Rate = (metrics.v5Count/impressions*100).toFixed(2);
    metrics.v7Count = Math.floor(impressions*(0.2+Math.random()*0.3));
    metrics.v7Rate = (metrics.v7Count/impressions*100).toFixed(2);
    metrics.p10Count = Math.floor(impressions*(0.15+Math.random()*0.25));
    metrics.p25Count = Math.floor(impressions*(0.1+Math.random()*0.2));
    metrics.p50Count = Math.floor(impressions*(0.05+Math.random()*0.15));
    metrics.p75Count = Math.floor(impressions*(0.03+Math.random()*0.1));
    metrics.p90Count = Math.floor(impressions*(0.02+Math.random()*0.08));
    metrics.p95Count = Math.floor(impressions*(0.01+Math.random()*0.05));
    metrics.p100Count = Math.floor(impressions*(0.005+Math.random()*0.03));
  }
  return metrics;
}

function aggregateByName(items){
  var groups = {};
  for(var i=0;i<items.length;i++){
    var item = items[i];
    var nm = item.name;
    if(!groups[nm]){
      groups[nm] = {
        ids:[],
        creativeIds:[],
        adIds:[],
        projectIds:[],
        accountIds:[],
        type:item.type,
        biz:item.biz,
        optimizer:item.optimizer,
        designer:item.designer,
        channels:{},
        urls:[],
        createTimes:[],
        dataDates:[],
        cost:0,
        impressions:0,
        clicks:0,
        conversions:0,
        ctr_vals:[],
        cpm_vals:[],
        cvr_vals:[],
        effectivePlays_vals:[],
        effectivePlayRate_vals:[],
        v3Count_vals:[],
        v3Rate_vals:[],
        v5Count_vals:[],
        v5Rate_vals:[],
        v7Count_vals:[],
        v7Rate_vals:[],
        p10Count_vals:[],
        p25Count_vals:[],
        p50Count_vals:[],
        p75Count_vals:[],
        p90Count_vals:[],
        p95Count_vals:[],
        p100Count_vals:[],
        useStatusCount:0,
        adCountTotal:0,
        count:0
      };
    }
    var g = groups[nm];
    g.ids.push(item.id);
    g.creativeIds.push(item.creativeId);
    g.adIds.push(item.adId);
    g.projectIds.push(item.projectId);
    g.accountIds.push(item.accountId);
    if(item.channel) g.channels[item.channel] = (g.channels[item.channel]||0)+1;
    g.urls.push(item.url);
    g.createTimes.push(item.createTime);
    g.dataDates.push(item.dataDate);
    g.cost += item.cost;
    g.impressions += item.impressions;
    g.clicks += item.clicks;
    g.conversions += item.conversions;
    g.ctr_vals.push(parseFloat(item.ctr));
    g.cpm_vals.push(parseFloat(item.cpm));
    g.cvr_vals.push(parseFloat(item.cvr));
    if(item.type==='视频'){
      g.effectivePlays_vals.push(item.effectivePlays);
      g.effectivePlayRate_vals.push(parseFloat(item.effectivePlayRate));
      g.v3Count_vals.push(item.v3Count);
      g.v3Rate_vals.push(parseFloat(item.v3Rate));
      g.v5Count_vals.push(item.v5Count);
      g.v5Rate_vals.push(parseFloat(item.v5Rate));
      g.v7Count_vals.push(item.v7Count);
      g.v7Rate_vals.push(parseFloat(item.v7Rate));
      g.p10Count_vals.push(item.p10Count);
      g.p25Count_vals.push(item.p25Count);
      g.p50Count_vals.push(item.p50Count);
      g.p75Count_vals.push(item.p75Count);
      g.p90Count_vals.push(item.p90Count);
      g.p95Count_vals.push(item.p95Count);
      g.p100Count_vals.push(item.p100Count);
    }
    if(item.useStatus==='使用中') g.useStatusCount++;
    g.adCountTotal += (item.adCount || 0);
    g.count++;
  }
  var result = [];
  var keys = Object.keys(groups);
  var sum = function(arr){ return arr.reduce(function(a,b){return a+b;},0); };
  for(var j=0;j<keys.length;j++){
    var g = groups[keys[j]];
    var avgCtr    = g.ctr_vals.length ? (sum(g.ctr_vals)/g.ctr_vals.length).toFixed(2) : '0.00';
    var avgCpm    = g.cpm_vals.length ? (sum(g.cpm_vals)/g.cpm_vals.length).toFixed(2) : '0.00';
    var avgCvr    = g.cvr_vals.length ? (sum(g.cvr_vals)/g.cvr_vals.length).toFixed(2) : '0.00';
    var avgEffectivePlays = g.effectivePlays_vals.length ? Math.round(sum(g.effectivePlays_vals)/g.effectivePlays_vals.length) : 0;
    var avgEffectivePlayRate = g.effectivePlayRate_vals.length ? (sum(g.effectivePlayRate_vals)/g.effectivePlayRate_vals.length).toFixed(2) : '0.00';
    var avgV3Count = g.v3Count_vals.length ? Math.round(sum(g.v3Count_vals)/g.v3Count_vals.length) : 0;
    var avgV3Rate = g.v3Rate_vals.length ? (sum(g.v3Rate_vals)/g.v3Rate_vals.length).toFixed(2) : '0.00';
    var avgV5Count = g.v5Count_vals.length ? Math.round(sum(g.v5Count_vals)/g.v5Count_vals.length) : 0;
    var avgV5Rate = g.v5Rate_vals.length ? (sum(g.v5Rate_vals)/g.v5Rate_vals.length).toFixed(2) : '0.00';
    var avgV7Count = g.v7Count_vals.length ? Math.round(sum(g.v7Count_vals)/g.v7Count_vals.length) : 0;
    var avgV7Rate = g.v7Rate_vals.length ? (sum(g.v7Rate_vals)/g.v7Rate_vals.length).toFixed(2) : '0.00';
    var avgP10 = g.p10Count_vals.length ? Math.round(sum(g.p10Count_vals)/g.p10Count_vals.length) : 0;
    var avgP25 = g.p25Count_vals.length ? Math.round(sum(g.p25Count_vals)/g.p25Count_vals.length) : 0;
    var avgP50 = g.p50Count_vals.length ? Math.round(sum(g.p50Count_vals)/g.p50Count_vals.length) : 0;
    var avgP75 = g.p75Count_vals.length ? Math.round(sum(g.p75Count_vals)/g.p75Count_vals.length) : 0;
    var avgP90 = g.p90Count_vals.length ? Math.round(sum(g.p90Count_vals)/g.p90Count_vals.length) : 0;
    var avgP95 = g.p95Count_vals.length ? Math.round(sum(g.p95Count_vals)/g.p95Count_vals.length) : 0;
    var avgP100 = g.p100Count_vals.length ? Math.round(sum(g.p100Count_vals)/g.p100Count_vals.length) : 0;
    var topChannel = '';
    var maxC = 0;
    var chKeys = Object.keys(g.channels);
    for(var c=0;c<chKeys.length;c++){ if(g.channels[chKeys[c]]>maxC){ maxC=g.channels[chKeys[c]]; topChannel=chKeys[c]; } }
    result.push({
      _isSummary:true,
      _count:g.count,
      id:'summary_'+g.name,
      name:g.name,
      creativeId: g.creativeIds.join(', '),
      adId: g.adIds.join(', '),
      projectId: g.projectIds.join(', '),
      accountId: g.accountIds.join(', '),
      type:g.type,
      biz:g.biz,
      optimizer:g.optimizer,
      designer:g.designer,
      channel:topChannel,
      url: g.urls[0]||'',
      createTime: g.createTimes.sort().reverse()[0]||'',
      dataDate: g.dataDates[0]||'',
      cost:g.cost,
      useStatus: g.useStatusCount > 0 ? '使用中' : '未使用',
      adCount:g.adCountTotal || 0,
      impressions:g.impressions,
      cpm:avgCpm,
      clicks:g.clicks,
      ctr:avgCtr,
      conversions:g.conversions,
      cvr:avgCvr,
      effectivePlays:avgEffectivePlays,
      effectivePlayRate:avgEffectivePlayRate,
      v3Count:avgV3Count,
      v3Rate:avgV3Rate,
      v5Count:avgV5Count,
      v5Rate:avgV5Rate,
      v7Count:avgV7Count,
      v7Rate:avgV7Rate,
      p10Count:avgP10,
      p25Count:avgP25,
      p50Count:avgP50,
      p75Count:avgP75,
      p90Count:avgP90,
      p95Count:avgP95,
      p100Count:avgP100,
      _rawIds: g.ids
    });
  }
  return result;
}

function sortBy(key){
    if(window.phaseView && window.phaseView < 2){
      alert('排序功能将在第二期开放');
      return;
    }
  if(sortKey===key){
    sortOrder = sortOrder==='asc' ? 'desc' : 'asc';
  } else {
    sortKey = key;
    sortOrder = (key==='createTime' || key==='cost' || key==='dataDate') ? 'desc' : 'asc';
  }
  render();
}

function applySort(items){
  if(!sortKey) return items;
  var order = sortOrder;
  var key = sortKey;
  var sorted = items.slice();
  sorted.sort(function(a, b){
    var va = a[key];
    var vb = b[key];
    if(['cost','impressions','cpm','clicks','conversions','effectivePlays','v3Count','v5Count','v7Count','p10Count','p25Count','p50Count','p75Count','p90Count','p95Count','p100Count'].indexOf(key)!==-1){
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
    }
    if(typeof va === 'string') va = va.toLowerCase();
    if(typeof vb === 'string') vb = vb.toLowerCase();
    if(va < vb) return order==='asc' ? -1 : 1;
    if(va > vb) return order==='asc' ? 1 : -1;
    return 0;
  });
  return sorted;
}

function applyFilter(){
  filterApplied = true;
  var s = document.getElementById('searchInput').value.trim().toLowerCase();
  var type = document.getElementById('typeFilter').value;
  var biz = document.getElementById('bizFilter').value;
  var ch = document.getElementById('channelFilter').value;
  var o = document.getElementById('optimizerFilter').value;
  var d = document.getElementById('designerFilter').value;
  var accountId = document.getElementById('accountIdFilter').value.trim().toLowerCase();
  var projectId = document.getElementById('projectIdFilter').value.trim().toLowerCase();
  var adId = document.getElementById('adIdFilter').value.trim().toLowerCase();
  var creativeId = document.getElementById('creativeIdFilter').value.trim().toLowerCase();
  var dateCs = document.getElementById('dateCreatedStart').value;
  var dateCe = document.getElementById('dateCreatedEnd').value;
  var dateRs = document.getElementById('dateRangeStart').value;
  var dateRe = document.getElementById('dateRangeEnd').value;
  filtered = data.filter(function(item){
    if(s && item.name.toLowerCase().indexOf(s)===-1) return false;
    if(type && item.type!==type) return false;
    if(biz && item.biz!==biz) return false;
    if(ch && item.channel!==ch) return false;
    if(o && item.optimizer!==o) return false;
    if(d && item.designer!==d) return false;
    if(accountId && item.accountId.toLowerCase().indexOf(accountId)===-1) return false;
    if(projectId && item.projectId.toLowerCase().indexOf(projectId)===-1) return false;
    if(adId && item.adId.toLowerCase().indexOf(adId)===-1) return false;
    if(creativeId && item.creativeId.toLowerCase().indexOf(creativeId)===-1) return false;
    if(dateCs && item.createTime < dateCs) return false;
    if(dateCe && item.createTime > dateCe) return false;
    return true;
  });
  selected = new Set();
  render();
}

function resetFilters(){
  document.getElementById('searchInput').value = '';
  document.getElementById('typeFilter').value = '';
  document.getElementById('bizFilter').value = '';

function showSummaryDetail(name){

function render(){
  var cols = ALL_COLS.filter(function(c){
    if(c.videoOnly){
      var hasVideo = filtered.some(function(item){ return item.type==='视频'; }) ||
                      data.some(function(item){ return item.type==='视频'; });
      return c.show && hasVideo;
    }
    if(displayMode==='summary' && ['preview','creativeId','adId','projectId','accountId','url','createTime'].indexOf(c.key)!==-1) return false;
    if(timeMode==='summary' && c.key==='dataDate') return false;
    return c.show;
  });
  var thead = document.getElementById('colHeaderRow');
  var thHtml = '';
  if(filtered.length===0 && filterApplied){
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="99" style="text-align:center;padding:60px 20px;color:var(--text-3)">' +
      '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.35;display:block;margin:0 auto 12px"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>' +
      '<p>暂无数据</p></td></tr>';
    thead.innerHTML = '';
    updateBatchBar();
    return;
  }
  if(displayMode==='detail'){
    thHtml += '<th style="width:40px;text-align:center"><input type="checkbox" ' + (selected.size===filtered.length&&filtered.length>0?'checked':'') + ' onchange="toggleCheckAll(this.checked)"></th>';
  }
  cols.forEach(function(c){
    // 明细模式不显示使用状态和关联广告数列
    if(displayMode==='detail' && (c.key==='useStatus' || c.key==='adCount')) return;
    var isNum = ['cost','impressions','cpm','clicks','conversions','effectivePlays','v3Count','v5Count','v7Count','p10Count','p25Count','p50Count','p75Count','p90Count','p95Count','p100Count'].indexOf(c.key)!==-1;
    var sortable = isNum || c.key==='createTime' || c.key==='dataDate';
    var sortIcon = '';
    if(sortable){
      if(sortKey===c.key){
        sortIcon = sortOrder==='asc' ? ' ↑' : ' ↓';
      } else {
        sortIcon = ' ⇅';
      }
    }
    var clickHandler = sortable ? (' onclick="sortBy(\'' + c.key + '\')" style="cursor:pointer;user-select:none"') : '';
    thHtml += '<th ' + (isNum?'style="text-align:right"':'') + clickHandler + '>' + c.label + sortIcon + '</th>';
  });
  if(displayMode==='detail'){
    thHtml += '<th>操作</th>';
  }
  thead.innerHTML = thHtml;
  var displayData = (displayMode==='summary') ? aggregateByName(filtered) : filtered;
  displayData = applySort(displayData);
  var tb = document.getElementById('tableBody');
  if(displayData.length===0){
    var colSpan = cols.length + (displayMode==='detail'?1:0);
    tb.innerHTML = '<tr><td colspan="' + colSpan + '" style="text-align:center;padding:60px 20px;color:var(--text-3)">' +
      '<svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="opacity:.35;display:block;margin:0 auto 12px"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>' +
      '<p>暂无数据</p></td></tr>';
  } else {
    var rows = [];
    for(var i=0;i<displayData.length;i++){
      var item = displayData[i];
      var tr = '';
      if(displayMode==='detail'){
        var checked = selected.has(item.id)?'checked':'';
        tr = '<tr class="' + (checked?'selected':'') + '" data-id="' + item.id + '">';
        tr += '<td style="text-align:center"><input type="checkbox" ' + checked + ' onchange="toggleRow(' + item.id + ',this.checked)"></td>';
        for(var j=0;j<cols.length;j++){
          tr += renderCell(item, cols[j].key, false);
        }
        tr += '<td>' +
          '<button class="action-btn edit" onclick="openEdit(' + item.id + ')">✏编辑</button> ' +
          '<button class="action-btn del" onclick="deleteOne(' + item.id + ')">🗑删除</button>' +
          '</td>';
      } else {
        tr = '<tr>';
        for(var j=0;j<cols.length;j++){
          tr += renderCell(item, cols[j].key, true);
        }
      }
      tr += '</tr>';
      rows.push(tr);
    }
    tb.innerHTML = rows.join('');
  }
  updateBatchBar();
}

function renderCell(item, key, isSummary){
  // 明细模式不显示使用状态和关联广告数
  if(displayMode==='detail' && (key==='useStatus' || key==='adCount')) return '';
  if(key==='preview'){
    if(isSummary) return '<td></td>';
    return '<td><img class="cell-thumb" src="' + item.thumb + '" alt="" onclick="openPreview(' + item.id + ')"></td>';
  }
  if(key==='name'){
    if(isSummary){
      return '<td>' + item.name + '</td>';
    }
    return '<td><span class="cell-name" onclick="openPreview(' + item.id + ')">' + item.name + '</span></td>';
  }
  if(key==='type'){
    var cls = item.type==='图片'?'tag-type-img':'tag-type-vid';
    return '<td><span class="tag-inline ' + cls + '">' + item.type + '</span></td>';
  }
  if(key==='biz'){ return '<td>' + item.biz + '</td>'; }
  if(key==='optimizer'||key==='designer'||key==='channel'){ return '<td>' + (item[key]||'-') + '</td>'; }
  if(key==='url'){
    var displayUrl = item.url&&item.url.length>30 ? item.url.slice(0,30)+'…' : (item.url||'');
    return '<td><a class="cell-link" href="' + (item.url||'#') + '" target="_blank" onclick="event.stopPropagation()">' + displayUrl + '</a></td>';
  }
  if(key==='createTime'){
    return '<td style="font-size:12px;color:var(--text-3)">' + (item.createTime||'-') + '</td>';
  }
  if(key==='dataDate'){
    return '<td style="font-size:12px;color:var(--text-3)">' + (item.dataDate||'-') + '</td>';
  }
  if(key==='cost'){
    return '<td style="text-align:right;font-weight:600;color:var(--danger)">¥' + Number(item.cost).toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}) + '</td>';
  }
  if(key==='impressions'){ return '<td style="text-align:right">' + Number(item.impressions).toLocaleString() + '</td>'; }
  if(key==='cpm'){ return '<td style="text-align:right">¥' + parseFloat(item.cpm).toFixed(2) + '</td>'; }
  if(key==='clicks'){ return '<td style="text-align:right">' + Number(item.clicks).toLocaleString() + '</td>'; }
  if(key==='ctr'||key==='cvr'||key==='effectivePlayRate'||key==='v3Rate'||key==='v5Rate'||key==='v7Rate'){ return '<td style="text-align:right">' + item[key] + '%</td>'; }
  if(key==='conversions'){ return '<td style="text-align:right">' + item.conversions + '</td>'; }
  if(key=='useStatus'){
    var st = item.useStatus || '未使用';
    var stCls = st=='使用中' ? 'tag-status-ok' : 'tag-status-off';
    return '<td><span class="' + stCls + '">' + st + '</span></td>';
  }
  if(key=='adCount'){ return '<td style="text-align:right">' + (item.adCount||0) + '</td>'; }
  if(key==='effectivePlays'||key==='v3Count'||key==='v5Count'||key==='v7Count'||key==='p10Count'||key==='p25Count'||key==='p50Count'||key==='p75Count'||key==='p90Count'||key==='p95Count'||key==='p100Count'){ return '<td style="text-align:right">' + Number(item[key]).toLocaleString() + '</td>'; }
  return '<td>' + (item[key]||'') + '</td>';
}

function toggleRow(id, checked){
  if(checked) selected.add(id); else selected.delete(id);
  updateBatchBar();
  updateHeaderCheckbox();
}
function toggleCheckAll(checked){
  if(displayMode==='summary') return;
  if(checked){
    filtered.forEach(function(item){ selected.add(item.id); });
  } else {
    filtered.forEach(function(item){ selected.delete(item.id); });
  }
  render();
}
function updateBatchBar(){
  var bar = document.getElementById('batchBar');
  if(selected.size>0 && displayMode==='detail'){
    bar.classList.add('show');
    bar.querySelector('#batchCount').textContent = selected.size;
  } else {
    bar.classList.remove('show');
  }
}
function updateHeaderCheckbox(){
  if(displayMode!=='detail') return;
  var thCheckbox = document.querySelector('#colHeaderRow input[type="checkbox"]');
  if(thCheckbox){
    thCheckbox.checked = (selected.size===filtered.length && filtered.length>0);
  }
}
function clearSelection(){
  selected = new Set();
  render();
}
function batchDelete(){
  if(selected.size===0) return;
  if(!confirm('确定要删除选中的 ' + selected.size + ' 条素材吗？')) return;
  data = data.filter(function(item){ return !selected.has(item.id); });
  selected = new Set();
  applyFilter();
  showToast('成功删除 ' + selected.size + ' 条素材');
}

function openColConfig(){
  var groups = {};
  ALL_COLS.forEach(function(c){
    var g = c.group || '其他';
    if(!groups[g]) groups[g] = [];
    groups[g].push(c);
  });
  var orderedGroups = ['基础信息'];
  if(groups['数据指标']) orderedGroups.push('数据指标');
  if(groups['视频指标']) orderedGroups.push('视频指标');
  var html = '';
  orderedGroups.forEach(function(gName){
    if(!groups[gName]) return;
    var cols = groups[gName];
    html += '<div class="col-group">';
    html += '  <div class="col-group-title">';
    html += '    <span>' + gName + '</span>';
    html += '    <div class="group-actions">';
    html += '      <button class="btn btn-outline" style="height:22px;font-size:11px;padding:0 8px" onclick="toggleGroup(\'' + gName + '\',true)">全选</button>';
    html += '      <button class="btn btn-outline" style="height:22px;font-size:11px;padding:0 8px" onclick="toggleGroup(\'' + gName + '\',false)">清空</button>';
    html += '    </div>';
    html += '  </div>';
    html += '  <div class="col-grid">';
    cols.forEach(function(c){
      html += '<div class="col-item" onclick="toggleCol(\'' + c.key + '\')" id="colOpt_' + c.key + '">' +
        '<input type="checkbox" ' + (c.show?'checked':'') + '> ' + c.label +
        '</div>';
    });
    html += '  </div>';
    html += '</div>';
  });
  document.getElementById('colGroups').innerHTML = html;
  document.getElementById('colMask').classList.add('show');
  document.body.style.overflow='hidden';
}

function toggleGroup(groupName, check){
  ALL_COLS.forEach(function(c){
    if(c.group === groupName){
      c.show = check;
    }
  });
  openColConfig();
}

    html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 10px;border:1px solid var(--border-light);border-radius:var(--radius-s)">' +
      '<input type="checkbox" value="' + c.key + '" ' + (c.show?'checked':'') + '> ' + c.label +
      '</div>';
  });
  grid.innerHTML = html;
  document.getElementById('exportMask').classList.add('show');
  document.body.style.overflow='hidden';
}
function selExp(range){
  exportRange = range;
  ['expAll','expFiltered','expSelected'].forEach(function(id){
    document.getElementById(id).classList.remove('selected');
  });
  document.getElementById('exp' + range.charAt(0).toUpperCase() + range.slice(1)).classList.add('selected');
}
function expCheckAll(check){
  var boxes = document.querySelectorAll('#expColGrid input[type="checkbox"]');
  boxes.forEach(function(b){ b.checked = check; });
}
function doExport(){
  if(!exportRange){ showToast('请选择导出范围'); return; }
  var checkedCols = [];
  var boxes = document.querySelectorAll('#expColGrid input[type="checkbox"]');
  boxes.forEach(function(b){ if(b.checked) checkedCols.push(b.value); });
  if(checkedCols.length===0){ showToast('请选择至少一个导出字段'); return; }
  closeModal('exportMask');
  showToast('正在导出数据，请稍候…');
  setTimeout(function(){
    showToast('导出成功！文件已保存到本地');
  }, 1500);
}

function showToast(msg, type){
  var toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.background = (type==='error') ? 'var(--danger)' : '#333';
  toast.classList.add('show');
  setTimeout(function(){ toast.classList.remove('show'); }, 2500);
}
