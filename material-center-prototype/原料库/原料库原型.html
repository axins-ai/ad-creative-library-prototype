<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材中心 - 原料库</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;margin:0;padding:0}
.app-header{height:52px;background:var(--bg-card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;box-shadow:var(--shadow-s);position:sticky;top:0;z-index:100;flex-shrink:0;}
.app-header .back-link{color:var(--primary);text-decoration:none;font-size:13px;margin-right:16px;display:flex;align-items:center;gap:4px}
.app-header .back-link:hover{text-decoration:underline}
.app-header .page-title{font-size:15px;font-weight:600;color:var(--text-1)}
.main-content{flex:1;display:flex;flex-direction:column;padding:16px 20px;gap:12px;min-height:0;overflow:auto}
.ms-filter-card{background:var(--bg-card);border-radius:var(--radius-l);padding:12px 14px;box-shadow:var(--shadow-s);flex-shrink:0;}
.ms-filter-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
.ms-filter-header:hover .ms-filter-toggle{color:var(--primary)}
.ms-filter-title{font-size:13px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:6px}
.ms-filter-toggle{font-size:12px;color:var(--text-3);transition:transform .2s;display:inline-block}
.ms-filter-toggle.collapsed{transform:rotate(-90deg)}
.ms-filter-body{display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;overflow:hidden;transition:max-height .3s,opacity .2s;max-height:200px;opacity:1}
.ms-filter-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
.ms-filter-item{display:flex;flex-direction:column;gap:3px;min-width:0}
.ms-filter-item label{font-size:11px;color:var(--text-3);font-weight:500;padding-left:1px}
.ms-filter-item select,.ms-filter-item input[type="date"]{height:30px;padding:0 8px;font-size:12px;border:1px solid var(--border);border-radius:var(--radius-s);outline:none;background:#fff;transition:border .2s;min-width:110px;}
.ms-filter-item select:focus,.ms-filter-item input:focus{border-color:var(--primary);box-shadow:0 0 0 2px rgba(22,100,255,.12)}
.ms-filter-item .date-sep{font-size:11px;color:var(--text-3);white-space:nowrap;flex-shrink:0;line-height:30px}
.ms-filter-actions{display:flex;gap:6px;align-items:flex-end;margin-left:auto}
.ms-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:30px;padding:0 12px;border:none;border-radius:var(--radius-s);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;user-select:none;white-space:nowrap;}
.ms-btn-primary{background:var(--primary);color:#fff}
.ms-btn-primary:hover{background:var(--primary-dark)}
.ms-btn-outline{background:#fff;color:var(--text-2);border:1px solid var(--border)}
.ms-btn-outline:hover{background:var(--bg-hover);color:var(--text-1)}
.ms-upload-bar{display:flex;align-items:center;justify-content:space-between;background:var(--bg-card);border-radius:var(--radius-l);padding:10px 14px;box-shadow:var(--shadow-s);flex-shrink:0;}
.ms-upload-bar .title{font-size:13px;font-weight:600;color:var(--text-1)}
.ms-list-area{background:var(--bg-card);border-radius:var(--radius-l);box-shadow:var(--shadow-s);flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.ms-list-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.ms-list-header .title{font-size:13px;font-weight:600;color:var(--text-1)}
.ms-list-header .count{font-size:12px;color:var(--text-3)}
.ms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;padding:12px;overflow-y:auto;flex:1;}
.ms-card{background:var(--bg-card);border-radius:var(--radius-l);overflow:hidden;box-shadow:var(--shadow-s);border:1px solid var(--border-light);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;}
.ms-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-m)}
.ms-card .thumb{width:100%;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;font-size:40px;position:relative;overflow:hidden;}
.ms-card .thumb .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.ms-card:hover .thumb .play-overlay{opacity:1}
.ms-card .thumb .play-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.ms-card .info{padding:10px 12px}
.ms-card .info .name{font-size:13px;font-weight:500;color:var(--text-1);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-card .info .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ms-card .info .meta-detail{font-size:11px;color:var(--text-3);margin-top:3px}
.type-qiantie{background:#e6f7ff;color:#1890ff}
.type-zhongduan{background:#f6ffed;color:#52c41a}
.type-weiqiang{background:#fff7e6;color:#fa8c16}
.type-zhonghouduan{background:#f0e6ff;color:#7b61ff}
.ms-empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text-3)}
.ms-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.ms-modal-overlay.show{opacity:1;pointer-events:auto}
.ms-modal{background:var(--bg-card);border-radius:var(--radius-l);box-shadow:var(--shadow-l);width:540px;max-height:85vh;display:flex;flex-direction:column;transform:translateY(20px);transition:transform .25s;}
.ms-modal-overlay.show .ms-modal{transform:translateY(0)}
.ms-modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.ms-modal-hd h3{font-size:15px;font-weight:600}
.ms-modal-hd .close-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:var(--radius-s);color:var(--text-3);font-size:18px;transition:all .2s;}
.ms-modal-hd .close-btn:hover{background:var(--bg-hover);color:var(--text-1)}
.ms-modal-bd{padding:16px 20px;overflow-y:auto;flex:1}
.ms-modal-ft{display:flex;justify-content:flex-end;gap:10px;padding:12px 20px;border-top:1px solid var(--border-light);flex-shrink:0;}
.ms-fm-group{margin-bottom:14px}
.ms-fm-group label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px}
.ms-fm-group label .req{color:var(--danger);margin-left:2px}
.ms-fm-group input,.ms-fm-group select{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-s);outline:none;transition:border .2s;font-family:var(--font);}
.ms-fm-group input:focus,.ms-fm-group select:focus{border-color:var(--primary)}
.ms-fm-group .sub-label{font-size:11px;color:var(--text-3);margin:8px 0 4px;display:block}
.ms-fm-group .tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.ms-fm-group .tag-pill{font-size:11px;padding:3px 8px;border-radius:12px;background:#f0f2f5;color:var(--text-2);border:1px solid var(--border-light)}
.ms-file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-3);font-size:13px;}
.ms-file-drop:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.ms-file-drop.dragover{border-color:var(--primary);background:var(--primary-light)}
.ms-file-info{font-size:12px;color:var(--text-2);margin-top:8px;padding:8px 12px;background:var(--bg-page);border-radius:var(--radius-s);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.toast-container{position:fixed;top:64px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:var(--radius);font-size:13px;box-shadow:var(--shadow-m);display:flex;align-items:center;gap:8px;animation:toastIn .3s ease;max-width:320px;}
.toast-success{background:#f6ffed;border:1px solid #b7eb8f;color:var(--success)}
.toast-warning{background:#fffbe6;border:1px solid #ffe58f;color:var(--warning)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<main class="main-content">
  <div class="ms-filter-card">
    <div class="ms-filter-header" onclick="toggleMsFilter()">
      <div class="ms-filter-title">🔍 筛选条件 <span class="ms-filter-toggle" id="msFilterToggle">▼</span></div>
    </div>
    <div class="ms-filter-body" id="msFilterBody">
      <div class="ms-filter-item">
        <label>类型</label>
        <select id="filterType" onchange="applyMsFilter()">
          <option value="">全部</option>
          <option>前贴</option>
          <option>中段</option>
          <option>尾帧</option>
          <option>中后段</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>业务</label>
        <select id="filterBiz" onchange="applyMsFilter()">
          <option value="">全部</option>
          <option>存量</option>
          <option>权益</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>渠道</label>
        <select id="filterChannel" onchange="applyMsFilter()">
          <option value="">全部</option>
          <option>广点通</option>
          <option>头条</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>优化师</label>
        <select id="filterOptimizer" onchange="applyMsFilter()">
          <option value="">全部</option>
          <option>崔志恒</option>
          <option>黄佩贤</option>
          <option>黎舒晴</option>
          <option>李雨航</option>
          <option>谭嘉颖</option>
          <option>林金维</option>
          <option>陈羽思</option>
          <option>叶首龙</option>
          <option>赖嘉俊</option>
          <option>戚嘉豪</option>
          <option>黄雄伟</option>
          <option>姚丰育</option>
          <option>卢俭聪</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>上传日期</label>
        <div style="display:flex;align-items:center;gap:4px">
          <input type="date" id="filterDateStart" onchange="applyMsFilter()">
          <span class="date-sep">~</span>
          <input type="date" id="filterDateEnd" onchange="applyMsFilter()">
        </div>
      </div>
      <div class="ms-filter-item">
        <label>用户标签</label>
        <select id="filterMsUserTag" onchange="applyMsFilter()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>产品标签</label>
        <select id="filterMsProductTag" onchange="applyMsFilter()">
          <option value="">全部</option>
          <option>39元</option>
          <option>59元</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>文案</label>
        <select id="filterMsContentWenan" onchange="applyMsFilter()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>宣传卖点</label>
        <select id="filterMsContentMaidian" onchange="applyMsFilter()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>场景</label>
        <select id="filterMsContentChangjing" onchange="applyMsFilter()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>对话</label>
        <select id="filterMsContentDuihua" onchange="applyMsFilter()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="ms-filter-item">
        <label>口播</label>
        <select id="filterMsContentKoubo" onchange="applyMsFilter()">
          <option value="">全部</option>
        </select>
      </div>
      <div class="ms-filter-actions">
        <button class="ms-btn ms-btn-outline" onclick="resetMsFilter()">重置</button>
      </div>
    </div>
  </div>
  <div class="ms-upload-bar">
    <div class="title">原料列表</div>
    <button class="ms-btn ms-btn-primary" onclick="openUploadModal()">↑ 上传原料</button>
  </div>
  <div class="ms-list-area">
    <div class="ms-list-header">
      <span class="title">全部原料</span>
      <span class="count" id="msCount">共 12 个原料</span>
    </div>
    <div class="ms-grid" id="msGrid"></div>
  </div>
</main>

<div class="ms-modal-overlay" id="msUploadOverlay" onclick="closeUploadModal(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd">
      <h3>上传原料</h3>
      <button class="close-btn" onclick="closeUploadModal()">×</button>
    </div>
    <div class="ms-modal-bd">
      <div class="ms-fm-group">
        <label>原料文件 <span class="req">*</span></label>
        <div class="ms-file-drop" id="msFileDrop" onclick="document.getElementById('msFileInput').click()">
          📁<br>
          <div>点击选择或拖拽文件到此处</div>
          <div style="font-size:11px;margin-top:4px;opacity:.6">支持 MP4 / MOV 格式，支持多选</div>
        </div>
        <input type="file" id="msFileInput" accept="video/*,image/*" multiple style="display:none" onchange="handleMaterialFileSelect(event)">
        <div id="msUploadFileInfo" class="ms-file-info" style="display:none"></div>
      </div>
      <div class="ms-fm-group">
        <label>原料类型 <span class="req">*</span></label>
        <select id="msUploadType" onchange="renderContentTagFields();">
          <option>前贴</option>
          <option>中段</option>
          <option>尾帧</option>
          <option>中后段</option>
        </select>
      </div>
      <div class="ms-fm-group">
        <label>业务归属</label>
        <select id="msUploadBiz">
          <option>存量</option>
          <option>权益</option>
        </select>
      </div>
      <div class="ms-fm-group">
        <label>渠道</label>
        <select id="msUploadChannel">
          <option>广点通</option>
          <option>头条</option>
        </select>
      </div>
      <div class="ms-fm-group">
        <label>优化师</label>
        <select id="msUploadOptimizer">
          <option value="">请选择</option>
          <option>崔志恒</option>
          <option>黄佩贤</option>
          <option>黎舒晴</option>
          <option>李雨航</option>
          <option>谭嘉颖</option>
          <option>林金维</option>
          <option>陈羽思</option>
          <option>叶首龙</option>
          <option>赖嘉俊</option>
          <option>戚嘉豪</option>
          <option>黄雄伟</option>
          <option>姚丰育</option>
          <option>卢俭聪</option>
        </select>
      </div>
      <div style="border-top:1px solid var(--border-light);margin:14px 0;padding-top:6px">
        <div style="font-size:12px;font-weight:600;color:var(--text-1);margin-bottom:10px">🏷️ 标签配置 <span style="font-size:11px;color:var(--danger);font-weight:400">* 全部必填</span></div>
        <div class="ms-fm-group">
          <label>用户标签 <span class="req">*</span></label>
          <div style="display:flex;gap:8px">
            <select id="msUserTag1" onchange="onUserTag1Change()" style="flex:1">
              <option value="">请选择</option>
              <option>地区</option>
              <option>年龄</option>
              <option>性别</option>
            </select>
            <select id="msUserTag2" style="flex:1">
              <option value="">请选择</option>
            </select>
          </div>
        </div>
        <div class="ms-fm-group">
          <label>产品标签 <span class="req">*</span></label>
          <select id="msProductTag">
            <option value="">请选择</option>
            <option>39元</option>
            <option>59元</option>
          </select>
        </div>
        <div id="msContentTagsWrap"></div>
      </div>
    </div>
    <div class="ms-modal-ft">
      <button class="ms-btn ms-btn-outline" onclick="closeUploadModal()">取消</button>
      <button class="ms-btn ms-btn-primary" onclick="submitUpload()">确认上传</button>
    </div>
  </div>
</div>

<div class="ms-modal-overlay" id="msPreviewOverlay" onclick="closeMsPreview(event)">
  <div class="ms-modal" onclick="event.stopPropagation()">
    <div class="ms-modal-hd">
      <h3 id="msPreviewName">原料预览</h3>
      <button class="close-btn" onclick="closeMsPreview()">×</button>
    </div>
    <div class="ms-modal-bd">
      <div style="background:#1a1a1a;border-radius:var(--radius);padding:40px;text-align:center;margin-bottom:16px">
        <span id="msPreviewIcon" style="font-size:80px">🎬</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div><span style="font-size:11px;color:var(--text-3)">原料名称</span><div id="msPVName" style="font-size:13px;font-weight:500;color:var(--text-1)"></div></div>
        <div><span style="font-size:11px;color:var(--text-3)">原料类型</span><div id="msPVType" style="font-size:13px;font-weight:500;color:var(--text-1)"></div></div>
        <div><span style="font-size:11px;color:var(--text-3)">业务归属</span><div id="msPVBiz" style="font-size:13px;color:var(--text-2)"></div></div>
        <div><span style="font-size:11px;color:var(--text-3)">渠道</span><div id="msPVChannel" style="font-size:13px;color:var(--text-2)"></div></div>
        <div><span style="font-size:11px;color:var(--text-3)">优化师</span><div id="msPVOptimizer" style="font-size:13px;color:var(--text-2)"></div></div>
        <div><span style="font-size:11px;color:var(--text-3)">上传日期</span><div id="msPVDate" style="font-size:13px;color:var(--text-2)"></div></div>
        <div><span style="font-size:11px;color:var(--text-3)">文件大小</span><div id="msPVSize" style="font-size:13px;color:var(--text-2)"></div></div>
        <div style="grid-column:1/-1"><span style="font-size:11px;color:var(--text-3)">标签</span><div id="msPVTags" style="font-size:13px;color:var(--text-2);margin-top:4px" class="tag-row"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
var msMaterials = [
  {id:1, name:"开场动画A", type:"前贴", biz:"存量", channel:"广点通", optimizer:"张三", date:"2026-06-20", size:"2.3MB"},
  {id:2, name:"产品介绍B", type:"中段", biz:"权益", channel:"头条", optimizer:"李四", date:"2026-06-19", size:"5.1MB"},
  {id:3, name:"行动号召C", type:"尾帧", biz:"存量", channel:"广点通", optimizer:"张三", date:"2026-06-18", size:"1.8MB"},
  {id:4, name:"前贴片-夏日版", type:"前贴", biz:"权益", channel:"头条", optimizer:"王五", date:"2026-06-17", size:"3.2MB"},

  {id:7, name:"前贴-品牌露出", type:"前贴", biz:"存量", channel:"头条", optimizer:"张三", date:"2026-06-14", size:"2.9MB"},
  {id:8, name:"中段-优惠说明", type:"中段", biz:"权益", channel:"广点通", optimizer:"李四", date:"2026-06-13", size:"4.1MB"},
  {id:9, name:"尾帧-立即行动", type:"尾帧", biz:"存量", channel:"头条", optimizer:"王五", date:"2026-06-12", size:"1.5MB"},

  {id:11, name:"中段-场景展示", type:"中段", biz:"存量", channel:"头条", optimizer:"李四", date:"2026-06-10", size:"6.3MB"},

var USER_TAG2_MAP = JSON.parse(JSON.stringify(DEFAULT_USER_TAG2_MAP));

function toggleMsFilter() {
  var body = document.getElementById("msFilterBody");
  var toggle = document.getElementById("msFilterToggle");
  if (body.classList.contains("collapsed")) {
    body.classList.remove("collapsed");
    toggle.classList.remove("collapsed");
  } else {
    body.classList.add("collapsed");
    toggle.classList.add("collapsed");
  }
}

function initMsTagFilters() {
  // 用户标签
  var userSel = document.getElementById("filterMsUserTag");
  for (var k in USER_TAG2_MAP) {
    if (!USER_TAG2_MAP.hasOwnProperty(k)) continue;
    for (var i = 0; i < USER_TAG2_MAP[k].length; i++) {
      userSel.innerHTML += '<option>' + USER_TAG2_MAP[k][i] + '</option>';
    }
  }
  // 内容标签 - 按类型分拆（使用所有类型的标签配置）
  var allContentTypes = ["文案", "宣传卖点", "场景", "对话", "口播"];
  var contentIds = {
    "文案": "filterMsContentWenan",
    "宣传卖点": "filterMsContentMaidian",
    "场景": "filterMsContentChangjing",
    "对话": "filterMsContentDuihua",
    "口播": "filterMsContentKoubo"
  };
  // 收集所有类型的内容标签值
  var allContentValues = {};
  for (var typeName in CONTENT_TAG_CONFIG) {
    if (!CONTENT_TAG_CONFIG.hasOwnProperty(typeName)) continue;
    var cfg = CONTENT_TAG_CONFIG[typeName];
    for (var ck in cfg) {
      if (!cfg.hasOwnProperty(ck)) continue;
      if (!allContentValues[ck]) allContentValues[ck] = [];
      for (var j = 0; j < cfg[ck].length; j++) {
        if (allContentValues[ck].indexOf(cfg[ck][j]) === -1) {
          allContentValues[ck].push(cfg[ck][j]);
        }
      }
    }
  }
  // 初始化每个内容标签下拉
  for (var t = 0; t < allContentTypes.length; t++) {
    var typeName = allContentTypes[t];
    var selId = contentIds[typeName];
    var sel = document.getElementById(selId);
    if (!sel || !allContentValues[typeName]) continue;
    for (var j = 0; j < allContentValues[typeName].length; j++) {
      sel.innerHTML += '<option>' + allContentValues[typeName][j] + '</option>';
    }
  }
}

function applyMsFilter() {
  renderMsGrid();
}

function resetMsFilter() {
  document.getElementById("filterType").value = "";
  document.getElementById("filterBiz").value = "";
  document.getElementById("filterChannel").value = "";
  document.getElementById("filterOptimizer").value = "";
  document.getElementById("filterDateStart").value = "";
  document.getElementById("filterDateEnd").value = "";
  document.getElementById("filterMsUserTag").value = "";
  document.getElementById("filterMsProductTag").value = "";
  document.getElementById("filterMsContentWenan").value = "";
  document.getElementById("filterMsContentMaidian").value = "";
  document.getElementById("filterMsContentChangjing").value = "";
  document.getElementById("filterMsContentDuihua").value = "";
  document.getElementById("filterMsContentKoubo").value = "";
  renderMsGrid();
}

function getFilteredMsMaterials() {
  var typeVal = document.getElementById("filterType").value;
  var bizVal = document.getElementById("filterBiz").value;
  var channelVal = document.getElementById("filterChannel").value;
  var optimizerVal = document.getElementById("filterOptimizer").value;
  var dateStart = document.getElementById("filterDateStart").value;
  var dateEnd = document.getElementById("filterDateEnd").value;
  var userTagVal = document.getElementById("filterMsUserTag").value;
  var productTagVal = document.getElementById("filterMsProductTag").value;
  var contentFilterVals = {};
  var contentIds = {
    "文案": "filterMsContentWenan",
    "宣传卖点": "filterMsContentMaidian",
    "场景": "filterMsContentChangjing",
    "对话": "filterMsContentDuihua",
    "口播": "filterMsContentKoubo"
  };
  for (var k in contentIds) {
    if (!contentIds.hasOwnProperty(k)) continue;
    var sel = document.getElementById(contentIds[k]);
    if (sel && sel.value) contentFilterVals[k] = sel.value;
  }

  var result = [];
  for (var i = 0; i < msMaterials.length; i++) {
    var m = msMaterials[i];
    if (typeVal && m.type !== typeVal) continue;
    if (bizVal && m.biz !== bizVal) continue;
    if (channelVal && m.channel !== channelVal) continue;
    if (optimizerVal && m.optimizer !== optimizerVal) continue;
    if (dateStart && m.date < dateStart) continue;
    if (dateEnd && m.date > dateEnd) continue;
    // 标签筛选
    if (m.tags) {
      if (userTagVal && m.tags.userValue !== userTagVal) continue;
      if (productTagVal && m.tags.product !== productTagVal) continue;
      if (m.tags.content) {
        var pass = true;
        for (var ck in contentFilterVals) {
          if (contentFilterVals.hasOwnProperty(ck) && m.tags.content[ck] !== contentFilterVals[ck]) {
            pass = false;
            break;
          }
        }
        if (!pass) continue;
      } else if (Object.keys(contentFilterVals).length > 0) {
        continue;
      }
    } else {
      if (userTagVal || productTagVal || Object.keys(contentFilterVals).length > 0) continue;
    }
    result.push(m);
  }
  return result;
}

function loadTagConfig() {
  try {
    var raw = localStorage.getItem("materialTags");
    if (!raw) return;
    var cfg = JSON.parse(raw);
    if (cfg.user) USER_TAG2_MAP = cfg.user;
    if (cfg.content) CONTENT_TAG_CONFIG = cfg.content;
  } catch (e) {}
}

function updateMaterialTags(cfg) {
  if (cfg.user) USER_TAG2_MAP = cfg.user;
  if (cfg.content) CONTENT_TAG_CONFIG = cfg.content;
}

loadTagConfig();

function extractTagValues(tags) {
  var values = [];
  if (!tags) return values;
  if (Array.isArray(tags)) {
    for (var i = 0; i < tags.length; i++) values.push(tags[i]);
  } else {
    if (tags.userValue) values.push(tags.userValue);
    if (tags.product) values.push(tags.product);
    if (tags.content) {
      for (var k in tags.content) {
        if (tags.content.hasOwnProperty(k)) values.push(tags.content[k]);
      }
    }
  }
  return values;
}

function renderMsGrid() {
  var grid = document.getElementById("msGrid");
  var data = getFilteredMsMaterials();
  if (data.length === 0) {
    grid.innerHTML = '<div class="ms-empty">暂无原料，请点击「上传原料」添加</div>';
    document.getElementById("msCount").textContent = "共 0 个原料";
    return;
  }
  var html = "";
  var typeLabels = { "前贴":"前贴", "中段":"中段", "尾帧":"尾帧", "中后段":"中后段" };
  var thumbColors = { "前贴":"linear-gradient(135deg,#e6f7ff,#bae7ff)", "中段":"linear-gradient(135deg,#f6ffed,#d9f7be)", "尾帧":"linear-gradient(135deg,#fff7e6,#ffe58f)", "中后段":"linear-gradient(135deg,#f0e6ff,#d3adf7)" };
  var thumbIcons = { "前贴":"🎬", "中段":"🎥", "尾帧":"📺", "中后段":"🎞️" };
  for (var i = 0; i < data.length; i++) {
    var m = data[i];
    var tagClass = "type-" + m.type;
    var icon = thumbIcons[m.type] || "🎬";
    var bg = thumbColors[m.type] || "#f5f5f5";
    var tagPills = "";
    var tagValues = extractTagValues(m.tags);
    if (tagValues.length) {
      for (var t = 0; t < tagValues.length; t++) {
        tagPills += '<span class="tag-pill">' + tagValues[t] + '</span>';
      }
    }
    html += '<div class="ms-card" onclick="openMsPreview(' + m.id + ')">' +
      '<div class="thumb" style="background:' + bg + '">' +
        '<span style="font-size:40px">' + icon + '</span>' +
        '<div class="play-overlay"><div class="play-btn">▶</div></div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="name">' + m.name + '</div>' +
        '<div class="meta"><span class="type-tag ' + tagClass + '" style="font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500">' + m.type + '</span></div>' +
        '<div class="tag-row">' + tagPills + '</div>' +
        '<div class="meta-detail">' + m.biz + ' · ' + m.channel + ' · ' + m.optimizer + '</div>' +
        '<div class="meta-detail" style="font-size:10px">' + m.date + ' · ' + m.size + '</div>' +
      '</div></div>';
  }
  grid.innerHTML = html;
  document.getElementById("msCount").textContent = "共 " + data.length + " 个原料";
}

function openUploadModal() {
  document.getElementById("msUploadOverlay").classList.add("show");
  msSelectedFiles = [];
  document.getElementById("msUploadFileInfo").style.display = "none";
  document.getElementById("msUserTag1").value = "";
  onUserTag1Change();
  document.getElementById("msProductTag").value = "";
  renderContentTagFields();
}

function onUserTag1Change() {
  var s1 = document.getElementById("msUserTag1").value;
  var s2 = document.getElementById("msUserTag2");
  s2.innerHTML = '<option value="">请选择</option>';
  if (s1 && USER_TAG2_MAP[s1]) {
    for (var i = 0; i < USER_TAG2_MAP[s1].length; i++) {
      s2.innerHTML += '<option>' + USER_TAG2_MAP[s1][i] + '</option>';
    }
  }
}

function renderContentTagFields() {
  var type = document.getElementById("msUploadType").value;
  var wrap = document.getElementById("msContentTagsWrap");
  var cfg = CONTENT_TAG_CONFIG[type] || {};
  var html = '<div class="ms-fm-group"><label>内容标签 <span class="req">*</span></label></div>';
  for (var k in cfg) {
    if (!cfg.hasOwnProperty(k)) continue;
    html += '<div class="ms-fm-group">' +
      '<div class="sub-label">' + k + '</div>' +
      '<select class="ms-content-tag" data-type="' + k + '">' +
        '<option value="">请选择</option>';
    for (var i = 0; i < cfg[k].length; i++) {
      html += '<option>' + cfg[k][i] + '</option>';
    }
    html += '</select></div>';
  }
  wrap.innerHTML = html;
}

function closeUploadModal(e) {
  if (e && e.target !== document.getElementById("msUploadOverlay")) return;
  document.getElementById("msUploadOverlay").classList.remove("show");
}

function handleMaterialFileSelect(e) {
  var files = Array.from(e.target.files);
  msSelectedFiles = msSelectedFiles.concat(files);
  renderUploadFileInfo();
}

function renderUploadFileInfo() {
  var el = document.getElementById("msUploadFileInfo");
  if (msSelectedFiles.length === 0) { el.style.display = "none"; return; }
  el.style.display = "flex";
  var tags = "";
  for (var i = 0; i < msSelectedFiles.length; i++) {
    tags += '<span style="background:#e8f1ff;padding:2px 6px;border-radius:4px;font-size:11px">' + msSelectedFiles[i].name + '</span>';
  }
  el.innerHTML = "📎 已选 " + msSelectedFiles.length + " 个文件：" + tags;
}

function submitUpload() {
  if (msSelectedFiles.length === 0) { showToast("请先选择原料文件", "warning"); return; }
  var type = document.getElementById("msUploadType").value;
  var biz = document.getElementById("msUploadBiz").value;
  var channel = document.getElementById("msUploadChannel").value;
  var optimizer = document.getElementById("msUploadOptimizer").value || "未设置";
  var userTag1 = document.getElementById("msUserTag1").value;
  var userTag2 = document.getElementById("msUserTag2").value;
  var productTag = document.getElementById("msProductTag").value;
  if (!userTag1 || !userTag2) { showToast("请选择用户标签", "warning"); return; }
  if (!productTag) { showToast("请选择产品标签", "warning"); return; }
  var contentTags = {};
  var ctgSelects = document.querySelectorAll(".ms-content-tag");
  for (var i = 0; i < ctgSelects.length; i++) {
    var s = ctgSelects[i];
    var k = s.getAttribute("data-type");
    var v = s.value;
    if (!v) { showToast("请填写完整的内容标签", "warning"); return; }
    contentTags[k] = v;
  }
  var tags = {
    userCategory: userTag1,
    userValue: userTag2,
    product: productTag,
    content: contentTags
  };
  for (var i = 0; i < msSelectedFiles.length; i++) {
    var file = msSelectedFiles[i];
    msMaterials.push({
      id: Date.now() + Math.random(),
      name: file.name.replace(/\.[^.]+$/, ""),
      type: type,
      biz: biz,
      channel: channel,
      optimizer: optimizer,
      date: new Date().toISOString().slice(0,10),
      size: (file.size/1024/1024).toFixed(1) + "MB",
      tags: tags
    });
  }
  renderMsGrid();
  closeUploadModal();
  showToast("成功上传 " + msSelectedFiles.length + " 个原料", "success");
  msSelectedFiles = [];
}

function openMsPreview(id) {
  for (var i = 0; i < msMaterials.length; i++) {
    if (msMaterials[i].id === id) {
      var m = msMaterials[i];
      document.getElementById("msPreviewName").textContent = m.name;
      document.getElementById("msPVName").textContent = m.name;
      document.getElementById("msPVType").textContent = m.type;
      document.getElementById("msPVBiz").textContent = m.biz;
      document.getElementById("msPVChannel").textContent = m.channel;
      document.getElementById("msPVOptimizer").textContent = m.optimizer;
      document.getElementById("msPVDate").textContent = m.date;
      document.getElementById("msPVSize").textContent = m.size;
      var tagHtml = "";
      var tagValues = extractTagValues(m.tags);
      if (tagValues.length) {
        for (var t = 0; t < tagValues.length; t++) {
          tagHtml += '<span class="tag-pill">' + tagValues[t] + '</span>';
        }
      } else {
        tagHtml = '<span style="color:var(--text-3)">无</span>';
      }
      document.getElementById("msPVTags").innerHTML = tagHtml;
      var icons = {"前贴":"🎬","中段":"🎥","尾帧":"📺","中后段":"🎞️"};
      document.getElementById("msPreviewIcon").textContent = icons[m.type] || "🎬";
      break;
    }
  }
  document.getElementById("msPreviewOverlay").classList.add("show");
}
function closeMsPreview(e) {
  if (e && e.target !== document.getElementById("msPreviewOverlay")) return;
  document.getElementById("msPreviewOverlay").classList.remove("show");
}

function showToast(msg, type) {
  type = type || "info";
  var container = document.getElementById("toastContainer");
  var el = document.createElement("div");
  el.className = "toast toast-" + type;
  el.textContent = msg;
  container.appendChild(el);
  setTimeout(function() { el.remove(); }, 2500);
}

loadTagConfig();
initMsTagFilters();
renderMsGrid();
</script>
