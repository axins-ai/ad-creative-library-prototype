<!DOCTYPE html>
<!-- 原料库原型 - 文件夹分类版 -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材中心 - 原料库</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;--bg-sidebar:#fafbfc;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;margin:0;padding:0}

/* 顶部导航 */
.top-nav{height:48px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0;z-index:100}
.top-nav .nav-title{font-size:15px;font-weight:600;color:var(--text-1)}
.top-nav .nav-breadcrumb{font-size:12px;color:var(--text-3);margin-left:12px}
.top-nav .nav-breadcrumb span{color:var(--primary);cursor:pointer}

/* 主布局 */
.main-layout{display:flex;flex:1;overflow:hidden}

/* 左侧文件夹侧边栏 */
.folder-sidebar{width:240px;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s,min-width .25s;position:relative}
.folder-sidebar.collapsed{width:48px;min-width:48px}
.folder-sidebar-toggle{position:absolute;top:8px;right:-12px;width:24px;height:24px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-3);z-index:10;box-shadow:var(--shadow-s);transition:all .2s}
.folder-sidebar-toggle:hover{color:var(--primary);border-color:var(--primary);transform:scale(1.1)}
.folder-sidebar.collapsed .folder-sidebar-toggle{right:-12px}
.folder-sidebar.collapsed .folder-sidebar-toggle .arrow{transform:rotate(180deg);display:inline-block}

.folder-sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.folder-sidebar.collapsed .folder-sidebar-header{padding:14px 0;justify-content:center}
.folder-sidebar-header .title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:.8px}
.folder-sidebar.collapsed .folder-sidebar-header .title{display:none}
.folder-sidebar-header .btn-new-folder{width:26px;height:26px;border-radius:var(--radius-s);border:1px solid var(--border);background:var(--bg-hover);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--primary);transition:all .2s;flex-shrink:0}
.folder-sidebar-header .btn-new-folder:hover{background:var(--primary-light);border-color:var(--primary)}
.folder-sidebar.collapsed .folder-sidebar-header .btn-new-folder{margin:0 auto}

.folder-tree{flex:1;overflow-y:auto;padding:6px 0}
.folder-sidebar.collapsed .folder-tree{padding:6px 0}

.folder-item{display:flex;align-items:center;padding:6px 12px;margin:1px 8px;cursor:pointer;transition:all .18s;position:relative;user-select:none;border-radius:var(--radius-s)}
.folder-sidebar.collapsed .folder-item{padding:8px 0;margin:1px 0;justify-content:center}
.folder-item:hover{background:var(--bg-hover)}
.folder-item.active{background:var(--primary-light);color:var(--primary)}
.folder-item.active .folder-name{color:var(--primary);font-weight:600}
.folder-item .folder-icon{font-size:15px;margin-right:8px;flex-shrink:0;width:20px;text-align:center}
.folder-sidebar.collapsed .folder-item .folder-icon{margin-right:0}
.folder-item .folder-name{flex:1;font-size:12px;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folder-sidebar.collapsed .folder-item .folder-name{display:none}
.folder-item .folder-count{font-size:10px;color:var(--text-3);margin-left:4px;flex-shrink:0;background:var(--bg-hover);padding:0 6px;border-radius:10px;line-height:18px;min-width:18px;text-align:center}
.folder-sidebar.collapsed .folder-item .folder-count{display:none}
.folder-item .folder-actions{display:none;gap:2px;flex-shrink:0;margin-left:4px}
.folder-sidebar.collapsed .folder-item .folder-actions{display:none !important}
.folder-item:hover .folder-actions{display:flex}
.folder-item.active .folder-actions{display:flex}
.folder-action-btn{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text-3);transition:all .15s}
.folder-action-btn:hover{background:rgba(0,0,0,.06);color:var(--text-1)}
.folder-action-btn.delete:hover{background:#fff1f0;color:var(--danger)}

.sidebar-divider{height:1px;background:var(--border-light);margin:6px 16px}
.folder-sidebar.collapsed .sidebar-divider{display:none}

/* 当前用户 */
.sidebar-user{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border-light);flex-shrink:0;transition:all .25s;overflow:hidden}
.folder-sidebar.collapsed .sidebar-user{justify-content:center;padding:10px 0}
.sidebar-user .user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#617afa);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0}
.sidebar-user .user-info{flex:1;min-width:0}
.folder-sidebar.collapsed .sidebar-user .user-info{display:none}
.sidebar-user .user-name{font-size:12px;font-weight:500;color:var(--text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-user .user-role{font-size:10px;color:var(--text-3)}

/* 右侧内容区 */
.content-area{flex:1;display:flex;flex-direction:column;overflow:hidden}

.content{flex:1;padding:20px 24px;overflow-y:auto}
.filter-bar-wrap{margin-bottom:20px;flex-shrink:0}
.filter-bar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
.filter-bar-header:hover .filter-bar-toggle{color:var(--primary)}
.filter-bar-title{font-size:13px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:6px}
.filter-bar-toggle{font-size:12px;color:var(--text-3);transition:transform .2s;display:inline-block}
.filter-bar-toggle.collapsed{transform:rotate(-90deg)}
.filter-bar{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;overflow:hidden;transition:max-height .3s,opacity .2s;max-height:200px;opacity:1;padding-bottom:4px}
.filter-bar.collapsed{max-height:0;opacity:0;margin:0;padding:0}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:12px;color:var(--text-3);font-weight:500;white-space:nowrap}
.filter-group select,.filter-group input[type="date"],.filter-group input[type="text"]{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:12px;color:var(--text-1);background:#fff;outline:none;}
.filter-group select:focus,.filter-group input:focus{border-color:var(--primary)}
.filter-group .date-sep{font-size:11px;color:#999}

/* 标签筛选区 */
.tag-filter-wrap{margin-top:4px}
.tag-filter-body{overflow:hidden;transition:max-height .3s,opacity .2s;max-height:500px;opacity:1}
.tag-filter-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
.tag-filter-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.tag-filter-row .filter-group{margin-bottom:0}
.tag-filter-row .filter-group label{font-size:11px;color:var(--text-3);font-weight:500;white-space:nowrap}

/* Filter card style */
.filter-card{background:var(--bg-card);border-radius:var(--radius-l);box-shadow:var(--shadow-s);margin-bottom:16px;overflow:hidden}
.filter-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-light);transition:background .15s}
.filter-card-header:hover{background:var(--bg-hover)}
.filter-card-title{font-size:13px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:6px}
.filter-card-toggle{font-size:12px;color:var(--text-3);transition:transform .2s;display:inline-block}
.filter-card-toggle.collapsed{transform:rotate(-90deg)}
.filter-card-body{display:flex;flex-direction:column;gap:10px;padding:12px 16px;overflow:hidden;transition:max-height .3s,opacity .2s;max-height:500px;opacity:1}
.filter-card-body.collapsed{max-height:0;opacity:0;padding:0 16px;margin:0}

.tag-cat-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.tag-cat-row:last-child{margin-bottom:0}
.tag-cat-label{font-size:11px;font-weight:600;color:var(--text-2);min-width:56px;padding-top:8px;white-space:nowrap;flex-shrink:0}
.tag-cat-items{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}

/* 工具栏 */
.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-shrink:0}
.toolbar-left{display:flex;align-items:center;gap:10px}
.toolbar-right{display:flex;align-items:center;gap:10px}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:32px;padding:0 14px;border-radius:var(--radius-s);font-size:13px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.btn-default{background:#fff;color:var(--text-2);border:1px solid var(--border)}
.btn-default:hover{color:var(--primary);border-color:var(--primary)}
.btn-danger{background:#fff;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:#fff1f0}

/* 素材网格 */
.ms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:4px 0}
.ms-card{background:var(--bg-card);border-radius:var(--radius-l);overflow:hidden;box-shadow:var(--shadow-s);border:1px solid var(--border-light);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;}
.ms-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-m)}
.ms-card .thumb{width:100%;aspect-ratio:16/9;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:48px;color:#ccc;position:relative;overflow:hidden;}
.ms-card .thumb .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.ms-card:hover .thumb .play-overlay{opacity:1}
.ms-card .thumb .play-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.ms-card .info{padding:12px 14px}
.ms-card .info .name{font-size:13px;font-weight:500;color:var(--text-1);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ms-card .info .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ms-card .badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.badge-auto{background:#e6f7ff;color:#1890ff}
.badge-manual{background:#fff8e1;color:#f57f17}
.type-qiantie{background:#e3f2fd;color:#1976d2}
.type-zhongduan{background:#e8f5e9;color:#388e3c}
.type-weiqiang{background:#f3e5f5;color:#7b1fa2}
.type-zhonghouduan{background:#fff8e1;color:#f57f17}
.tag-pill{font-size:10px;padding:2px 6px;border-radius:12px;background:#f0f2f5;color:var(--text-2);border:1px solid var(--border-light);margin-right:3px;margin-top:3px;display:inline-block}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-3);grid-column:1/-1;}
.empty-state .icon{font-size:64px;margin-bottom:16px;display:block}

/* 预览弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:40px;animation:fadeIn .2s;}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--radius-l);width:900px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-m);animation:slideUp .25s;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.modal-header h3{font-size:15px;font-weight:600}
.modal-header .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-3);transition:background .15s;}
.modal-header .close-btn:hover{background:var(--bg-page)}
.modal-body{display:flex;overflow:hidden}
.modal-preview{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:400px;position:relative;}
.modal-sidebar{width:280px;border-left:1px solid var(--border-light);padding:20px;overflow-y:auto;flex-shrink:0;}
.modal-sidebar .detail-row{margin-bottom:16px}
.modal-sidebar .detail-label{font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:4px}
.modal-sidebar .detail-value{font-size:13px;color:var(--text-1)}

/* 上传弹窗 */
.upload-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s;}
.upload-overlay.active{display:flex}
.upload-modal{background:#fff;border-radius:var(--radius-l);width:560px;max-width:95vw;max-height:90vh;box-shadow:var(--shadow-m);animation:slideUp .25s;display:flex;flex-direction:column;}
.upload-modal .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.upload-body{padding:16px 24px;overflow-y:auto;flex:1}
.upload-body .file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-3);font-size:13px;margin-bottom:16px;}
.upload-body .file-drop:hover,.upload-body .file-drop.drag-over{border-color:var(--primary);background:var(--primary-light)}
.upload-body .fm-group{margin-bottom:14px}
.upload-body .fm-group label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px}
.upload-body .fm-group label .req{color:var(--danger);margin-left:2px}
.upload-body .fm-group input,.upload-body .fm-group select{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-s);outline:none;transition:border .2s;font-family:var(--font);}
.upload-body .fm-group input:focus,.upload-body .fm-group select:focus{border-color:var(--primary)}
.search-select{position:relative;display:inline-block;min-width:140px;}
.upload-actions{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border-light);flex-shrink:0;}

/* 新建文件夹弹窗 */
.folder-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.folder-modal-overlay.active{display:flex}
.folder-modal{background:#fff;border-radius:12px;width:400px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:slideUp .25s;overflow:hidden}
.folder-modal .folder-modal-header{padding:20px 24px 12px}
.folder-modal .folder-modal-header h3{font-size:16px;font-weight:600;color:var(--text-1)}
.folder-modal .folder-modal-body{padding:0 24px 20px}
.folder-modal .folder-modal-body .input-wrap{margin-top:12px}
.folder-modal .folder-modal-body label{font-size:12px;color:var(--text-2);font-weight:500;margin-bottom:6px;display:block}
.folder-modal .folder-modal-body input{width:100%;height:36px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:13px;outline:none;transition:border .2s}
.folder-modal .folder-modal-body input:focus{border-color:var(--primary)}
.folder-modal .folder-modal-body .hint{font-size:11px;color:var(--text-3);margin-top:6px}
.folder-modal .folder-modal-actions{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

/* 移动到文件夹弹窗 */
.move-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.move-modal-overlay.active{display:flex}
.move-modal{background:#fff;border-radius:12px;width:420px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:slideUp .25s;overflow:hidden}
.move-modal .move-modal-header{padding:20px 24px 12px}
.move-modal .move-modal-header h3{font-size:16px;font-weight:600;color:var(--text-1)}
.move-modal .move-modal-body{padding:0 24px 16px;max-height:300px;overflow-y:auto}
.move-modal .move-folder-item{padding:10px 12px;border-radius:var(--radius-s);cursor:pointer;transition:background .15s;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.move-modal .move-folder-item:hover{background:var(--primary-light)}
.move-modal .move-folder-item.selected{background:var(--primary-light);color:var(--primary)}
.move-modal .move-folder-item .folder-icon{font-size:16px}
.move-modal .move-folder-item .folder-name{font-size:13px}
.move-modal .move-modal-actions{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:8px}

/* 消息弹窗 */
.msg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.msg-modal-overlay.active{display:flex}
.msg-modal{background:#fff;border-radius:12px;width:400px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:slideUp .25s;text-align:center;overflow:hidden}
.msg-modal .msg-icon{font-size:48px;margin:24px 0 8px}
.msg-modal .msg-text{font-size:14px;color:var(--text-1);padding:0 24px 20px;line-height:1.6}
.msg-modal .msg-btn{padding:12px 0;font-size:14px;font-weight:500;color:var(--primary);cursor:pointer;border-top:1px solid var(--border-light);transition:background .15s}
.msg-modal .msg-btn:hover{background:var(--bg-hover)}

/* Checkbox */
.ms-card .card-checkbox{position:absolute;top:8px;left:8px;width:18px;height:18px;border-radius:4px;border:2px solid rgba(255,255,255,.8);background:rgba(0,0,0,.2);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:10;transition:all .15s}
.ms-card .card-checkbox.checked{background:var(--primary);border-color:var(--primary)}
.ms-card .card-checkbox.checked:after{content:"✓";color:#fff;font-size:12px;font-weight:bold}
.ms-card:hover .card-checkbox,.select-mode .ms-card .card-checkbox{display:flex}
.ms-card .card-checkbox:not(.checked):hover{border-color:#fff;background:rgba(0,0,0,.3)}

/* 此CSS已被sidebar-user替代 */
</style>
</head>
<body>

<!-- 顶部导航 -->
<div class="top-nav">
  <div class="nav-title">📁 原料库</div>
  <div class="nav-breadcrumb">
    <span>素材中心</span> / <span>原料库</span>
  </div>
</div>

<!-- 主布局 -->
<div class="main-layout">
  <!-- 左侧文件夹侧边栏 -->
  <div class="folder-sidebar" id="folderSidebar">
    <button class="folder-sidebar-toggle" onclick="toggleSidebar()" title="折叠/展开侧边栏">
      <span class="arrow">◀</span>
    </button>
    <div class="sidebar-user">
      <div class="user-avatar">崔</div>
      <div class="user-info">
        <div class="user-name">崔志恒</div>
        <div class="user-role">优化师</div>
      </div>
    </div>
    
    <div class="folder-sidebar-header">
      <div class="title">文件夹</div>
      <button class="btn-new-folder" onclick="openNewFolderModal()" title="新建文件夹">＋</button>
    </div>
    
    <div class="folder-tree" id="folderTree">
      <!-- 文件夹树通过JS渲染 -->
    </div>
  </div>

  <!-- 右侧内容区 -->
  <div class="content-area">
    <div class="content">
      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="btn btn-primary" onclick="openMsUploadModal()">↑ 上传素材</button>
          <button class="btn btn-default" id="btnSelectMode" onclick="toggleSelectMode()">☑️ 批量管理</button>
          <button class="btn btn-default" id="btnMoveToFolder" onclick="openMoveModal()" style="display:none">📂 移动到文件夹</button>
          <button class="btn btn-danger" id="btnDeleteMaterials" onclick="deleteSelectedMaterials()" style="display:none">🗑️ 删除</button>
        </div>
        <div class="toolbar-right">
          <span style="font-size:12px;color:var(--text-3)" id="materialCountInline"></span>

<script>

// ========== 数据定义 ==========
var CURRENT_USER = "崔志恒"; // 当前用户（原型模拟）

var msFolders = [
  {id: 1, name: "开场动画合集", creator: "崔志恒", materials: [1, 4, 7]},
  {id: 2, name: "产品介绍素材", creator: "崔志恒", materials: [2, 5]},
  {id: 3, name: "行动号召素材", creator: "黄佩贤", materials: [3, 6]},
  {id: 4, name: "临时测试", creator: "崔志恒", materials: []},
];

var msMaterials = [
  {id:1, name:"开场动画A", type:"前贴", optimizer:"崔志恒", date:"2026-06-20", source:"自动入库", folders:[1]},
  {id:2, name:"产品介绍B", type:"中段", optimizer:"黄佩贤", date:"2026-06-19", source:"手动上传", folders:[2,3]},
  {id:3, name:"行动号召C", type:"尾帧", optimizer:"黎舒晴", date:"2026-06-18", source:"自动入库", folders:[3]},
  {id:4, name:"前贴片-夏日版", type:"前贴", optimizer:"李雨航", date:"2026-06-17", source:"手动上传", folders:[1]},
  {id:5, name:"中段-功能演示", type:"中段", optimizer:"谭嘉颖", date:"2026-06-16", source:"自动入库", folders:[2]},
  {id:6, name:"尾帧-下载引导", type:"尾帧", optimizer:"林金维", date:"2026-06-15", source:"自动入库", folders:[3]},
  {id:7, name:"前贴-品牌露出", type:"前贴", optimizer:"陈羽思", date:"2026-06-14", source:"自动入库", folders:[1]},
  {id:8, name:"中段-优惠说明", type:"中段", optimizer:"叶首龙", date:"2026-06-13", source:"手动上传", folders:[]},
  {id:9, name:"尾帧-立即行动", type:"尾帧", optimizer:"赖嘉俊", date:"2026-06-12", source:"自动入库", folders:[]},
  {id:10, name:"前贴-促销快剪", type:"前贴", optimizer:"戚嘉豪", date:"2026-06-11", source:"自动入库", folders:[]},
  {id:11, name:"中段-场景展示", type:"中段", optimizer:"黄雄伟", date:"2026-06-10", source:"自动入库", folders:[]},
  {id:12, name:"尾帧-关注引导", type:"尾帧", optimizer:"姚丰育", date:"2026-06-09", source:"手动上传", folders:[]},
];

var currentFolderId = null; // null = 全部原料
var isSelectMode = false;
var selectedMaterialIds = [];
var renameFolderId = null;
var moveTargetFolderId = null;

// ========== 文件夹树渲染 ==========
function renderFolderTree() {
  var tree = document.getElementById("folderTree");
  var html = "";
  
  // "全部原料"选项
  var totalCount = msMaterials.length;
  html += '<div class="folder-item ' + (currentFolderId === null ? 'active' : '') + '" onclick="selectFolder(null)">' +
    '<span class="folder-icon">📂</span>' +
    '<span class="folder-name">全部原料</span>' +
    '<span class="folder-count">' + totalCount + '</span>' +
    '</div>';
  
  // "未分类"选项
  var uncategorizedCount = 0;
  for (var i = 0; i < msMaterials.length; i++) {
    if (!msMaterials[i].folders || msMaterials[i].folders.length === 0) {
      uncategorizedCount++;
    }
  }
  html += '<div class="folder-item ' + (currentFolderId === -1 ? 'active' : '') + '" onclick="selectFolder(-1)">' +
    '<span class="folder-icon">📄</span>' +
    '<span class="folder-name">未分类</span>' +
    '<span class="folder-count">' + uncategorizedCount + '</span>' +
    '</div>';
  
  // 分隔线
  html += '<div class="sidebar-divider"></div>';
  
  // 用户创建的文件夹
  for (var i = 0; i < msFolders.length; i++) {
    var f = msFolders[i];
    var isOwner = f.creator === CURRENT_USER;
    html += '<div class="folder-item ' + (currentFolderId === f.id ? 'active' : '') + '" onclick="selectFolder(' + f.id + ')">' +
      '<span class="folder-icon">📁</span>' +
      '<span class="folder-name">' + f.name + '</span>' +
      '<span class="folder-count">' + f.materials.length + '</span>' +
      (isOwner ? '<div class="folder-actions">' +
        '<button class="folder-action-btn" title="重命名" onclick="event.stopPropagation();openRenameFolderModal(' + f.id + ')">✏️</button>' +
        '<button class="folder-action-btn delete" title="删除" onclick="event.stopPropagation();deleteFolder(' + f.id + ')">🗑️</button>' +
        '</div>' : '') +
      '</div>';
  }
  
  tree.innerHTML = html;
  
  // 同时更新上传弹窗的文件夹下拉
  var uploadFolderSel = document.getElementById("msUploadFolder");
  if (uploadFolderSel) {
    var options = '<option value="">未分类</option>';
    for (var j = 0; j < msFolders.length; j++) {
      options += '<option value="' + msFolders[j].id + '">' + msFolders[j].name + '</option>';
    }
    uploadFolderSel.innerHTML = options;
  }
}

// ========== 文件夹操作 ==========
function selectFolder(folderId) {
  currentFolderId = folderId;
  renderFolderTree();
  renderMsGrid();
}

// 折叠/展开侧边栏
function toggleSidebar() {
  var sidebar = document.getElementById("folderSidebar");
  sidebar.classList.toggle("collapsed");
}

function openNewFolderModal() {
  document.getElementById("newFolderName").value = "";
  document.getElementById("btnCreateFolder").disabled = true;
  document.getElementById("newFolderModal").classList.add("active");
  document.body.style.overflow = "hidden";
  setTimeout(function() {
    document.getElementById("newFolderName").focus();
  }, 100);
}

function closeNewFolderModal() {
  document.getElementById("newFolderModal").classList.remove("active");
  document.body.style.overflow = "";
}

function validateFolderName() {
  var name = document.getElementById("newFolderName").value.trim();
  document.getElementById("btnCreateFolder").disabled = name.length === 0;
}

function createFolder() {
  var name = document.getElementById("newFolderName").value.trim();
  if (!name) {
    showMsgModal("请输入文件夹名称");
    return;
  }
  
  // 检查重名
  for (var i = 0; i < msFolders.length; i++) {
    if (msFolders[i].name === name) {
      showMsgModal("已存在同名文件夹，请使用其他名称");
      return;
    }
  }
  
  msFolders.push({
    id: Date.now(),
    name: name,
    creator: CURRENT_USER,
    materials: []
  });
  
  closeNewFolderModal();
  renderFolderTree();
  showMsgModal("文件夹「" + name + "」创建成功！");
}

function openRenameFolderModal(folderId) {
  renameFolderId = folderId;
  var folder = null;
  for (var i = 0; i < msFolders.length; i++) {
    if (msFolders[i].id === folderId) { folder = msFolders[i]; break; }
  }
  if (!folder) return;
  
  document.getElementById("renameFolderName").value = folder.name;
  document.getElementById("renameFolderModal").classList.add("active");
  document.body.style.overflow = "hidden";
  setTimeout(function() {
    document.getElementById("renameFolderName").focus();
  }, 100);
}

function closeRenameFolderModal() {
  document.getElementById("renameFolderModal").classList.remove("active");
  document.body.style.overflow = "";
  renameFolderId = null;
}

function renameFolder() {
  var name = document.getElementById("renameFolderName").value.trim();
  if (!name) {
    showMsgModal("请输入文件夹名称");
    return;
  }
  
  for (var i = 0; i < msFolders.length; i++) {
    if (msFolders[i].id === renameFolderId) {
      msFolders[i].name = name;
      break;
    }
  }
  
  closeRenameFolderModal();
  renderFolderTree();
  showMsgModal("文件夹重命名成功！");
}

function deleteFolder(folderId) {
  var folder = null;
  for (var i = 0; i < msFolders.length; i++) {
    if (msFolders[i].id === folderId) { folder = msFolders[i]; break; }
  }
  if (!folder) return;
  
  if (!confirm("确定要删除文件夹「" + folder.name + "」吗？\n文件夹内的素材不会被删除，只会从文件夹中移除。")) {
    return;
  }
  
  // 从素材的folders属性中移除该文件夹
  for (var j = 0; j < msMaterials.length; j++) {
    if (msMaterials[j].folders) {
      var idx = msMaterials[j].folders.indexOf(folderId);
      if (idx !== -1) {
        msMaterials[j].folders.splice(idx, 1);
      }
    }
  }
  
  // 删除文件夹
  msFolders = msFolders.filter(function(f) { return f.id !== folderId; });
  
  // 如果当前正在查看这个文件夹，切换回"全部原料"
  if (currentFolderId === folderId) {
    currentFolderId = null;
  }
  
  renderFolderTree();
  renderMsGrid();
  showMsgModal("文件夹「" + folder.name + "」已删除");
}

// ========== 素材网格渲染 ==========
function getFilteredMsMaterials() {
  var nameKw = (document.getElementById("nameFilter") && document.getElementById("nameFilter").value || "").trim().toLowerCase();
  var typeVal = (document.getElementById("typeFilter") && document.getElementById("typeFilter").value) || "全部类型";
  var sourceVal = (document.getElementById("sourceFilter") && document.getElementById("sourceFilter").value) || "全部来源";
  
  var result = [];
  for (var i = 0; i < msMaterials.length; i++) {
    var m = msMaterials[i];
    
    // 文件夹筛选
    if (currentFolderId === -1) {
      // 未分类
      if (m.folders && m.folders.length > 0) continue;
    } else if (currentFolderId !== null) {
      // 特定文件夹
      if (!m.folders || m.folders.indexOf(currentFolderId) === -1) continue;
    }
    
    // 其他筛选
    if (nameKw && m.name.toLowerCase().indexOf(nameKw) === -1) continue;
    if (typeVal !== "全部类型" && m.type !== typeVal) continue;
    if (sourceVal !== "全部来源" && m.source !== sourceVal) continue;
    
    result.push(m);
  }
  return result;
}

function renderMsGrid() {
  var data = getFilteredMsMaterials();
  var el = document.getElementById("msGrid");
  if (!el) return;
  
  if (data.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📂</div><div class="title">暂无原料</div><div class="desc">试试调整筛选条件，或上传新原料</div></div>';
    updateMaterialCount(data.length);
    return;
  }
  
  var html = "";
  for (var i = 0; i < data.length; i++) {
    var m = data[i];
    var bg = "linear-gradient(135deg,#1a1a2e,#16213e)";
    var badgeMap = {"前贴":"type-qiantie","中段":"type-zhongduan","尾帧":"type-weiqiang","中后段":"type-zhonghouduan"};
    var badgeCls = badgeMap[m.type] || "type-qiantie";
    var sourceCls = m.source === "自动入库" ? "badge-auto" : "badge-manual";
    
    var isChecked = selectedMaterialIds.indexOf(m.id) !== -1;
    var checkboxCls = "card-checkbox" + (isChecked ? " checked" : "");
    
    html += '<div class="ms-card" onclick="onCardClick(' + m.id + ', event)">' +
      '<div class="' + checkboxCls + '" onclick="event.stopPropagation();toggleMaterialSelect(' + m.id + ')" data-id="' + m.id + '"></div>' +
      '<div class="thumb" style="background:' + bg + '">' +
        '<div style="color:rgba(255,255,255,.3);font-size:36px">🎬</div>' +
        '<div class="play-overlay"><div class="play-btn">▶</div></div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="name">' + m.name + '</div>' +
        '<div class="meta"><span class="badge ' + badgeCls + '">' + m.type + '</span>' +
        '<span class="badge ' + sourceCls + '">' + m.source + '</span></div>' +
      '</div></div>';
  }
  el.innerHTML = html;
  updateMaterialCount(data.length);
}

function updateMaterialCount(count) {
  var el = document.getElementById("materialCountInline");
  if (el) el.textContent = "共 " + count + " 个原料";
  var el2 = document.getElementById("msCountInline");
  if (el2) el2.textContent = "共 " + count + " 个原料";
}

// ========== 卡片点击和选择模式 ==========
function onCardClick(id, event) {
  if (isSelectMode) {
    toggleMaterialSelect(id);
  } else {
    openMsPreview(id);
  }
}

function toggleSelectMode() {
  isSelectMode = !isSelectMode;
  var btn = document.getElementById("btnSelectMode");
  var btnMove = document.getElementById("btnMoveToFolder");
  var btnDelete = document.getElementById("btnDeleteMaterials");
  
  if (isSelectMode) {
    btn.textContent = "✅ 取消选择";
    btnMove.style.display = "inline-flex";
    btnDelete.style.display = "inline-flex";
  } else {
    btn.textContent = "☑️ 批量管理";
    btnMove.style.display = "none";
    btnDelete.style.display = "none";
    selectedMaterialIds = [];
  }
  renderMsGrid();
}

function toggleMaterialSelect(id) {
  var idx = selectedMaterialIds.indexOf(id);
  if (idx === -1) {
    selectedMaterialIds.push(id);
  } else {
    selectedMaterialIds.splice(idx, 1);
  }
  renderMsGrid();
  updateSelectionActions();
}

function updateSelectionActions() {
  var btnMove = document.getElementById("btnMoveToFolder");
  var btnDelete = document.getElementById("btnDeleteMaterials");
  if (selectedMaterialIds.length > 0) {
    btnMove.disabled = false;
    btnDelete.disabled = false;
  } else {
    btnMove.disabled = true;
    btnDelete.disabled = true;
  }
}

// ========== 移动到文件夹 ==========
function openMoveModal() {
  if (selectedMaterialIds.length === 0) return;
  
  moveTargetFolderId = null;
  var listEl = document.getElementById("moveFolderList");
  var html = '<div class="move-folder-item" onclick="selectMoveTarget(null)">' +
    '<span class="folder-icon">📄</span>' +
    '<span class="folder-name">未分类（移除文件夹）</span>' +
    '</div>';
  
  for (var i = 0; i < msFolders.length; i++) {
    html += '<div class="move-folder-item" onclick="selectMoveTarget(' + msFolders[i].id + ')">' +
      '<span class="folder-icon">📁</span>' +
      '<span class="folder-name">' + msFolders[i].name + '</span>' +
      '</div>';
  }
  
  listEl.innerHTML = html;
  document.getElementById("btnConfirmMove").disabled = true;
  document.getElementById("moveToFolderModal").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeMoveModal() {
  document.getElementById("moveToFolderModal").classList.remove("active");
  document.body.style.overflow = "";
  moveTargetFolderId = null;
}

function selectMoveTarget(folderId) {
  moveTargetFolderId = folderId;
  
  // 更新UI
  var items = document.querySelectorAll(".move-folder-item");
  for (var i = 0; i < items.length; i++) {
    items[i].classList.remove("selected");
  }
  event.currentTarget.classList.add("selected");
  
  document.getElementById("btnConfirmMove").disabled = false;
}

function confirmMoveToFolder() {
  if (moveTargetFolderId === null) {
    // 移动到"未分类"（从所有文件夹中移除）
    for (var i = 0; i < selectedMaterialIds.length; i++) {
      var materialId = selectedMaterialIds[i];
      for (var j = 0; j < msMaterials.length; j++) {
        if (msMaterials[j].id === materialId) {
          msMaterials[j].folders = [];
          break;
        }
      }
    }
  } else {
    // 移动到指定文件夹
    for (var i = 0; i < selectedMaterialIds.length; i++) {
      var materialId = selectedMaterialIds[i];
      for (var j = 0; j < msMaterials.length; j++) {
        if (msMaterials[j].id === materialId) {
          if (!msMaterials[j].folders) msMaterials[j].folders = [];
          if (msMaterials[j].folders.indexOf(moveTargetFolderId) === -1) {
            msMaterials[j].folders.push(moveTargetFolderId);
          }
          break;
        }
      }
    }
    
    // 更新文件夹的materials计数
    for (var k = 0; k < msFolders.length; k++) {
      if (msFolders[k].id === moveTargetFolderId) {
        // 重新统计（简单方式）
        var count = 0;
        for (var m = 0; m < msMaterials.length; m++) {
          if (msMaterials[m].folders && msMaterials[m].folders.indexOf(moveTargetFolderId) !== -1) {
            count++;
          }
        }
        msFolders[k].materials = [];
        for (var n = 0; n < msMaterials.length; n++) {
          if (msMaterials[n].folders && msMaterials[n].folders.indexOf(moveTargetFolderId) !== -1) {
            msFolders[k].materials.push(msMaterials[n].id);
          }
        }
        break;
      }
    }
  }
  
  closeMoveModal();
  selectedMaterialIds = [];
  isSelectMode = false;
  document.getElementById("btnSelectMode").textContent = "☑️ 批量管理";
  document.getElementById("btnMoveToFolder").style.display = "none";
  document.getElementById("btnDeleteMaterials").style.display = "none";
  renderFolderTree();
  renderMsGrid();
  showMsgModal("已成功移动 " + selectedMaterialIds.length + " 个素材");
}

// ========== 删除素材 ==========
function deleteSelectedMaterials() {
  if (selectedMaterialIds.length === 0) return;
  
  if (!confirm("确定要删除选中的 " + selectedMaterialIds.length + " 个素材吗？")) {
    return;
  }
  
  msMaterials = msMaterials.filter(function(m) {
    return selectedMaterialIds.indexOf(m.id) === -1;
  });
  
  selectedMaterialIds = [];
  isSelectMode = false;
  document.getElementById("btnSelectMode").textContent = "☑️ 批量管理";
  document.getElementById("btnMoveToFolder").style.display = "none";
  document.getElementById("btnDeleteMaterials").style.display = "none";
  renderFolderTree();
  renderMsGrid();
  showMsgModal("已删除选中素材");
}

// ========== 预览 ==========
function openMsPreview(id) {
  var m = null;
  for (var i = 0; i < msMaterials.length; i++) {
    if (msMaterials[i].id === id) { m = msMaterials[i]; break; }
  }
  if (!m) return;
  
  document.getElementById("msPreviewTitle").textContent = "预览：" + m.name;
  document.getElementById("detailName").textContent = m.name;
  document.getElementById("detailType").textContent = m.type;
  document.getElementById("detailOptimizer").textContent = m.optimizer;
  document.getElementById("detailDate").textContent = m.date;
  
  // 显示所在文件夹
  var folderNames = [];
  if (m.folders && m.folders.length > 0) {
    for (var j = 0; j < m.folders.length; j++) {
      for (var k = 0; k < msFolders.length; k++) {
        if (msFolders[k].id === m.folders[j]) {
          folderNames.push(msFolders[k].name);
          break;
        }
      }
    }
  }
  document.getElementById("detailFolder").innerHTML = folderNames.length > 0 
    ? folderNames.map(function(n) { return '<span class="tag-pill">' + n + '</span>'; }).join('')
    : '<span style="color:var(--text-3);font-size:12px">未分类</span>';
  
  document.getElementById("msPreviewModal").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeMsPreview() {
  document.getElementById("msPreviewModal").classList.remove("active");
  document.body.style.overflow = "";
}

// ========== 上传 ==========
function openMsUploadModal() {
  document.getElementById("msUploadOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closeMsUploadModal() {
  document.getElementById("msUploadOverlay").classList.remove("active");
  document.body.style.overflow = "";
}

function submitMsUpload() {
  var folderId = document.getElementById("msUploadFolder").value;
  var newId = Date.now();
  var newMaterial = {
    id: newId,
    name: "新上传素材_" + newId,
    type: document.getElementById("msUploadFileType").value,
    optimizer: CURRENT_USER,
    date: new Date().toISOString().slice(0, 10),
    source: "手动上传",
    folders: folderId ? [parseInt(folderId)] : []
  };
  
  msMaterials.push(newMaterial);
  
  // 更新文件夹计数
  if (folderId) {
    for (var i = 0; i < msFolders.length; i++) {
      if (msFolders[i].id === parseInt(folderId)) {
        msFolders[i].materials.push(newId);
        break;
      }
    }
  }
  
  closeMsUploadModal();
  renderFolderTree();
  renderMsGrid();
  showMsgModal("素材上传成功！");
}

// ========== 筛选 ==========
function toggleMsFilterBar() {
  var bar = document.getElementById("msFilterBar");
  var toggle = document.getElementById("msFilterBarToggle");
  if (bar.classList.contains("collapsed")) {
    bar.classList.remove("collapsed");
    toggle.classList.remove("collapsed");

    bar.classList.add("collapsed");

}

function resetMsFilter() {

}

function filterMsOptimizerOptions(keyword, selectId, dropdownId) {
  var select = document.getElementById(selectId);
  var dropdown = document.getElementById(dropdownId);
  var input = dropdown.querySelector('.search-input');
  var keyword = input.value.toLowerCase();
  
  // 清空下拉选项
  var existingOptions = dropdown.querySelectorAll('.option-item');
  existingOptions.forEach(function(item) { item.remove(); });
  
  // 获取 select 中的所有选项
  var options = select.options;
  var hasMatch = false;
  
  for (var i = 0; i < options.length; i++) {
    var text = options[i].text;
    if (text.toLowerCase().indexOf(keyword) !== -1 || options[i].value === "") {
      var item = document.createElement('div');
      item.className = 'option-item';
      if (options[i].selected) item.classList.add('selected');
      item.textContent = text;
      item.setAttribute('data-value', options[i].value);
      item.onclick = (function(idx) {
        return function() {
          select.selectedIndex = idx;
          dropdown.classList.remove('show');
          if (selectId === 'optimizerFilter') applyMsFilter();
        };
      })(i);
      dropdown.appendChild(item);
      if (text.toLowerCase().indexOf(keyword) !== -1) hasMatch = true;
    }
  }
}

function handleMsUploadFileSelect(e) {
  var files = Array.from(e.target.files);
  uploadSelectedFiles = uploadSelectedFiles.concat(files);
  renderMsUploadFileList();
}


  // === 内容标签渲染函数 ===
function renderMsUploadContentTagFields() {
  var wrap = document.getElementById("msUploadContentTagsWrap");
  var fileType = document.getElementById("msUploadFileType").value;
  var config = getMsContentTagConfig(fileType);
  var html = '<div class="fm-group"><label>内容标签 <span class="req">*</span></label></div>';
  for (var k in config) {
    if (!config.hasOwnProperty(k)) continue;
    html += '<div class="fm-group">' +
      '<div style="font-size:11px;color:var(--text-3);margin-bottom:4px">' + k + '</div>' +
      '<select class="upload-content-tag" data-type="' + k + '">' +
        '<option value="">请选择</option>';
    for (var i = 0; i < config[k].length; i++) {
      html += '<option>' + config[k][i] + '</option>';
    }
    html += '</select></div>';
  }
  wrap.innerHTML = html;
}
