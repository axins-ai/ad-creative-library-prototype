<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素材中心 - 文件夹管理</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);
  --radius:8px;--radius-s:6px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;margin:0;padding:0}

/* 顶部 */
.top-nav{height:48px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;flex-shrink:0}
.top-nav .nav-title{font-size:15px;font-weight:600}
.top-nav .nav-title .icon{font-size:16px}

/* 主内容 */
.content{padding:20px;flex:1;overflow-y:auto;max-width:960px;margin:0 auto;width:100%}

/* 页面头部 */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.page-header h2{font-size:16px;font-weight:600}
.page-header .actions{display:flex;gap:8px}

/* 工具栏 */
.toolbar{margin-bottom:12px;display:flex;align-items:center;gap:8px}
.toolbar .search-input{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:13px;outline:none;flex:1;max-width:300px;background:#fff}
.toolbar .search-input:focus{border-color:var(--primary)}
.toolbar .count-info{font-size:12px;color:var(--text-3);margin-left:auto}

/* 表格 */
.folder-table{width:100%;background:#fff;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.folder-table table{width:100%;border-collapse:collapse}
.folder-table th{text-align:left;padding:10px 14px;font-size:12px;font-weight:600;color:var(--text-3);background:var(--bg-page);border-bottom:1px solid var(--border)}
.folder-table td{padding:10px 14px;font-size:13px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.folder-table tr:last-child td{border-bottom:none}
.folder-table tr:hover td{background:var(--bg-hover)}
.folder-table .folder-icon-cell{font-size:16px;text-align:center;width:36px}
.folder-table .folder-name{font-weight:500;color:var(--text-1)}
.folder-table .folder-creator{font-size:12px;color:var(--text-3)}
.folder-table .folder-mcount{font-size:12px;color:var(--text-2);text-align:center}
.folder-table .folder-actions{text-align:right;white-space:nowrap}
.folder-table .empty-row td{text-align:center;padding:40px 20px;color:var(--text-3);font-size:13px}

/* 按钮 */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:4px;height:30px;padding:0 12px;border-radius:var(--radius-s);font-size:12px;font-weight:500;border:none;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark)}
.btn-default{background:#fff;color:var(--text-2);border:1px solid var(--border)}
.btn-default:hover{color:var(--primary);border-color:var(--primary)}
.btn-text{background:transparent;border:none;color:var(--text-3);padding:2px 6px;font-size:12px;cursor:pointer}
.btn-text:hover{color:var(--primary)}
.btn-text.danger:hover{color:var(--danger)}

/* 弹窗 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal{background:#fff;border-radius:var(--radius);width:380px;max-width:90vw;box-shadow:0 8px 30px rgba(0,0,0,.15)}
.modal-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:600}
.modal-header .close-btn{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:14px;color:var(--text-3);display:flex;align-items:center;justify-content:center}
.modal-header .close-btn:hover{background:var(--bg-hover)}
.modal-body{padding:0 20px 16px}
.modal-body label{font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:4px;display:block}
.modal-body input[type=text]{width:100%;height:34px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:13px;outline:none;background:#fff}
.modal-body input[type=text]:focus{border-color:var(--primary)}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border-light);display:flex;justify-content:flex-end;gap:6px}
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-title"><span class="icon">📁</span> 文件夹管理</div>
</div>

<div class="content">
  <!-- 页面头部 -->
  <div class="page-header">
    <h2>文件夹列表</h2>
    <div class="actions">
      <button class="btn btn-primary" onclick="openNewFolder()">+ 新建文件夹</button>
    </div>
  </div>

  <!-- 工具栏 -->
  <div class="toolbar">
    <input class="search-input" type="text" id="searchInput" placeholder="搜索文件夹名称..." oninput="renderTable()">
    <span class="count-info" id="countInfo"></span>
  </div>

  <!-- 文件夹表格 -->
  <div class="folder-table" id="folderTableWrap">
    <table>
      <thead>
        <tr>
          <th style="width:36px"></th>
          <th>文件夹名称</th>
          <th style="width:60px">素材</th>
          <th style="width:80px">创建人</th>
          <th style="width:100px">操作</th>
        </tr>
      </thead>
      <tbody id="folderTableBody"></tbody>
    </table>
  </div>
</div>

<!-- 新建/重命名 弹窗 -->
<div class="modal-overlay" id="folderModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">新建文件夹</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label>文件夹名称</label>
      <input type="text" id="folderNameInput" placeholder="请输入名称" maxlength="50">
    </div>
    <div class="modal-footer">
      <button class="btn btn-default" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" id="modalConfirmBtn" onclick="confirmModal()">确定</button>
    </div>
  </div>
</div>

<script>
// ========== 数据 ==========
var CURRENT_USER = "崔志恒";

var msFolders = [
  {id: 1, name: "开场动画合集", creator: "崔志恒"},
  {id: 2, name: "产品介绍素材", creator: "崔志恒"},
  {id: 3, name: "行动号召素材", creator: "黄佩贤"},
  {id: 4, name: "临时测试", creator: "崔志恒"},
];

var msMaterials = [
  {id:1, name:"开场动画A", folders:[1]},{id:2, name:"产品介绍B", folders:[2,3]},
  {id:3, name:"行动号召C", folders:[3]},{id:4, name:"前贴片-夏日版", folders:[1]},
  {id:5, name:"中段-功能演示", folders:[2]},{id:6, name:"尾帧-下载引导", folders:[3]},
  {id:7, name:"前贴-品牌露出", folders:[1]},{id:8, name:"中段-优惠说明", folders:[]},
  {id:9, name:"尾帧-立即行动", folders:[]},{id:10, name:"前贴-促销快剪", folders:[]},
];

var modalMode = null; // 'create' | 'rename'
var editFolderId = null;

function getFolderCount(folderId) {
  var c = 0;
  for (var i = 0; i < msMaterials.length; i++) {
    if (msMaterials[i].folders && msMaterials[i].folders.indexOf(folderId) !== -1) c++;
  }
  return c;
}

function renderTable() {
  var kw = document.getElementById("searchInput").value.trim().toLowerCase();
  var tbody = document.getElementById("folderTableBody");
  var html = "";
  var shown = 0;
  
  for (var i = 0; i < msFolders.length; i++) {
    var f = msFolders[i];
    var count = getFolderCount(f.id);
    if (kw && f.name.toLowerCase().indexOf(kw) === -1) continue;
    var isOwner = f.creator === CURRENT_USER;
    
    html += '<tr>' +
      '<td class="folder-icon-cell">📁</td>' +
      '<td><div class="folder-name">' + f.name + '</div></td>' +
      '<td class="folder-mcount">' + count + '</td>' +
      '<td><span class="folder-creator">' + f.creator + '</span></td>' +
      '<td class="folder-actions">' +
        (isOwner ? 
          '<button class="btn btn-text" onclick="openRename(\'' + f.name + '\',' + f.id + ')">编辑</button>' +
          '<button class="btn btn-text danger" onclick="deleteFolder(' + f.id + ',\'' + f.name.replace(/'/g, "\\'") + '\')">删除</button>'
          : '<span style="font-size:11px;color:var(--text-3)">只读</span>') +
      '</td></tr>';
    shown++;
  }
  
  if (shown === 0) {
    html = '<tr class="empty-row"><td colspan="5">暂无文件夹，点击「新建文件夹」开始</td></tr>';
  }
  
  tbody.innerHTML = html;
  document.getElementById("countInfo").textContent = "共 " + shown + " 个文件夹";
}

// ========== 新建文件夹 ==========
function openNewFolder() {
  modalMode = 'create';
  editFolderId = null;
  document.getElementById("modalTitle").textContent = "新建文件夹";
  document.getElementById("folderNameInput").value = "";
  document.getElementById("modalConfirmBtn").textContent = "创建";
  document.getElementById("folderModal").classList.add("active");
  setTimeout(function() { document.getElementById("folderNameInput").focus(); }, 50);
}

function openRename(name, id) {
  modalMode = 'rename';
  editFolderId = id;
  document.getElementById("modalTitle").textContent = "重命名文件夹";
  document.getElementById("folderNameInput").value = name;
  document.getElementById("modalConfirmBtn").textContent = "保存";
  document.getElementById("folderModal").classList.add("active");
  setTimeout(function() { document.getElementById("folderNameInput").focus(); }, 50);
}

function closeModal() {
  document.getElementById("folderModal").classList.remove("active");
  modalMode = null;
  editFolderId = null;
}

function confirmModal() {
  var name = document.getElementById("folderNameInput").value.trim();
  if (!name) { alert("请输入文件夹名称"); return; }
  
  if (modalMode === 'create') {
    // 检查重名
    for (var i = 0; i < msFolders.length; i++) {
      if (msFolders[i].name === name) { alert("已存在同名文件夹"); return; }
    }
    msFolders.push({id: Date.now(), name: name, creator: CURRENT_USER});
  } else if (modalMode === 'rename') {
    for (var i = 0; i < msFolders.length; i++) {
      if (msFolders[i].id === editFolderId) { msFolders[i].name = name; break; }
    }
  }
  
  closeModal();
  renderTable();
}

function deleteFolder(id, name) {
  if (!confirm("确定要删除文件夹「" + name + "」吗？")) return;
  
  // 从素材中移除该文件夹
  for (var j = 0; j < msMaterials.length; j++) {
    if (msMaterials[j].folders) {
      var idx = msMaterials[j].folders.indexOf(id);
      if (idx !== -1) msMaterials[j].folders.splice(idx, 1);
    }
  }
  
  msFolders = msFolders.filter(function(f) { return f.id !== id; });
  renderTable();
}

// ========== 键盘快捷键 ==========
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") closeModal();
  if (e.key === "Enter" && document.getElementById("folderModal").classList.contains("active")) confirmModal();
});

// ========== 初始化 ==========
renderTable();
</script>
</body>
</html>
