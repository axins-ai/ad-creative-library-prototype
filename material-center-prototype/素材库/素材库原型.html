<!DOCTYPE html>
<!-- v20260630-1017: fix getFilteredData null safety + hide top-bar -->
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>素材中心 - 素材库</title>
<style>
*,*:before,*:after{margin:0;padding:0;box-sizing:border-box}
:root{
  --primary:#1664ff;--primary-light:#e8f1ff;--primary-dark:#0952d9;
  --success:#52c41a;--warning:#faad14;--danger:#ff4d4f;
  --text-1:rgba(0,0,0,.88);--text-2:rgba(0,0,0,.65);--text-3:rgba(0,0,0,.42);
  --bg-page:#f0f2f5;--bg-card:#fff;--bg-hover:#f7f8fa;
  --border:#e8e8e8;--border-light:#f0f0f0;
  --shadow-s:0 1px 3px rgba(0,0,0,.05);--shadow-m:0 4px 16px rgba(0,0,0,.1);
  --radius:8px;--radius-s:6px;--radius-l:12px;
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
}
html{font-size:14px}
body{font-family:var(--font);background:var(--bg-page);color:var(--text-1);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;margin:0;padding:0}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;height:32px;padding:0 14px;border-radius:var(--radius-s);font-size:13px;font-weight:500;border:1px solid transparent;cursor:pointer;transition:all .18s;white-space:nowrap;}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}
.btn-primary:hover{background:var(--primary-dark)}
.content{flex:1;padding:20px 24px;overflow-y:auto}
.filter-bar-wrap{margin-bottom:20px;flex-shrink:0}
.filter-bar-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;cursor:pointer;user-select:none}
.filter-bar-header:hover .filter-bar-toggle{color:var(--primary)}
.filter-bar-title{font-size:13px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:6px}
.filter-bar-toggle{font-size:12px;color:var(--text-3);transition:transform .2s;display:inline-block}
.filter-bar-toggle.collapsed{transform:rotate(-90deg)}
.filter-bar{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap;overflow:hidden;transition:max-height .3s,opacity .2s;max-height:200px;opacity:1;padding-bottom:4px}
.filter-bar.collapsed{max-height:0;opacity:0;margin:0;padding:0}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-group label{font-size:12px;color:var(--text-3);font-weight:500;white-space:nowrap}
.tag-filter-wrap{margin-top:6px}
.tag-filter-body{overflow:hidden;transition:max-height .3s,opacity .2s;max-height:600px;opacity:1;padding-top:8px}
.tag-filter-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
.tag-filter-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.tag-filter-row .filter-group{margin-bottom:0}
.tag-filter-row .filter-group label{font-size:11px;color:var(--text-3);font-weight:500;white-space:nowrap;margin-bottom:3px}
.filter-group select,.filter-group input[type="date"],.filter-group input[type="text"]{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:12px;color:var(--text-1);background:#fff;outline:none;}
.filter-group select:focus,.filter-group input:focus{border-color:var(--primary)}
.filter-group .date-sep{font-size:11px;color:#999}

/* 标签筛选区样式 */
.tag-filter-wrap{margin-top:4px}
.tag-filter-body{overflow:hidden;transition:max-height .3s,opacity .2s;max-height:500px;opacity:1}
.tag-filter-body.collapsed{max-height:0;opacity:0;margin:0;padding:0}
.tag-filter-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.tag-filter-row .filter-group{margin-bottom:0}
.tag-filter-row .filter-group label{font-size:11px;color:var(--text-3);font-weight:500;white-space:nowrap}
.filter-group label{font-size:12px;color:var(--text-3);font-weight:500;white-space:nowrap}
.filter-group select,.filter-group input[type="date"],.filter-group input[type="text"]{height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:12px;color:var(--text-1);background:#fff;outline:none;}
.filter-group select:focus,.filter-group input:focus{border-color:var(--primary)}
.filter-group .date-sep{font-size:11px;color:#999}

/* 搜索下拉框样式 */
.search-select{position:relative;display:inline-block;min-width:140px;}
.search-select select{width:100%;height:32px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius-s);font-size:12px;color:var(--text-1);background:#fff;outline:none;appearance:none;-webkit-appearance:none;padding-right:24px;}
.search-select select:focus{border-color:var(--primary)}
.search-select .select-arrow{position:absolute;right:8px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--text-3);font-size:10px;}
.search-select-dropdown{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid var(--primary);border-radius:var(--radius-s);box-shadow:0 4px 12px rgba(0,0,0,.15);max-height:200px;overflow-y:auto;z-index:1000;display:none;margin-top:2px;}
.search-select-dropdown.show{display:block}
.search-select-dropdown .search-input{width:100%;padding:6px 8px;border:none;border-bottom:1px solid var(--border-light);outline:none;font-size:12px;}
.search-select-dropdown .option-item{padding:6px 10px;cursor:pointer;font-size:12px;transition:background .15s;}
.search-select-dropdown .option-item:hover{background:var(--primary-light);color:var(--primary)}
.search-select-dropdown .option-item.selected{background:var(--primary-light);color:var(--primary);font-weight:500;}

.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;padding:4px 16px 0}
.grid-card{background:var(--bg-card);border-radius:var(--radius-l);overflow:hidden;box-shadow:var(--shadow-s);border:1px solid var(--border-light);transition:transform .2s,box-shadow .2s;cursor:pointer;position:relative;}
.grid-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-m)}
.grid-card .thumb{width:100%;aspect-ratio:16/9;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:48px;color:#ccc;position:relative;overflow:hidden;}
.grid-card .thumb .play-overlay{position:absolute;inset:0;background:rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
.grid-card:hover .thumb .play-overlay{opacity:1}
.grid-card .thumb .play-btn{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.2)}
.grid-card .info{padding:12px 14px}
.grid-card .info .name{font-size:13px;font-weight:500;color:var(--text-1);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.grid-card .info .meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.grid-card .badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.badge-video{background:#e3f2fd;color:#1976d2}
.badge-image{background:#e8f5e9;color:#388e3c}
.badge-auto{background:#f3e5f5;color:#7b1fa2}
.badge-manual{background:#fff8e1;color:#f57f17}
.tag-pill{font-size:10px;padding:2px 6px;border-radius:12px;background:#f0f2f5;color:var(--text-2);border:1px solid var(--border-light);margin-right:3px;margin-top:3px;display:inline-block}
.empty-state{text-align:center;padding:80px 20px;color:var(--text-3);grid-column:1/-1;}
.empty-state .icon{font-size:64px;margin-bottom:16px;display:block}

/* 预览弹窗样式 */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;padding:40px;animation:fadeIn .2s;}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:#fff;border-radius:var(--radius-l);width:900px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow-m);animation:slideUp .25s;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.modal-header h3{font-size:15px;font-weight:600}
.modal-header .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-3);transition:background .15s;}
.modal-header .close-btn:hover{background:var(--bg-page)}
.modal-body{display:flex;overflow:hidden}
.modal-preview{flex:1;background:#1a1a1a;display:flex;align-items:center;justify-content:center;min-height:400px;position:relative;}
.modal-preview .preview-placeholder{text-align:center;color:rgba(255,255,255,.5)}
.modal-preview .preview-placeholder .play-icon{font-size:80px;display:block;margin-bottom:16px}
.modal-sidebar{width:280px;border-left:1px solid var(--border-light);padding:20px;overflow-y:auto;flex-shrink:0;}
.modal-sidebar .detail-row{margin-bottom:16px}
.modal-sidebar .detail-label{font-size:11px;color:var(--text-3);font-weight:500;margin-bottom:4px}
.modal-sidebar .detail-value{font-size:13px;color:var(--text-1)}

/* 上传弹窗样式 */
.upload-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s;}
.upload-overlay.active{display:flex}
.upload-modal{background:#fff;border-radius:var(--radius-l);width:560px;max-width:95vw;max-height:90vh;box-shadow:var(--shadow-m);animation:slideUp .25s;display:flex;flex-direction:column;}
.upload-modal .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.upload-modal .modal-header h3{font-size:15px;font-weight:600}
.upload-modal .modal-header .close-btn{width:32px;height:32px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text-3);transition:background .15s;}
.upload-modal .modal-header .close-btn:hover{background:var(--bg-page)}
.upload-body{padding:16px 24px;overflow-y:auto;flex:1}
.upload-body .file-drop{border:2px dashed var(--border);border-radius:var(--radius);padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;color:var(--text-3);font-size:13px;margin-bottom:16px;}
.upload-body .file-drop:hover,.upload-body .file-drop.drag-over{border-color:var(--primary);background:var(--primary-light)}
.upload-body .file-list{font-size:12px;color:var(--text-2);margin-top:8px;padding:8px 12px;background:var(--bg-page);border-radius:var(--radius-s);display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.upload-body .fm-group{margin-bottom:14px}
.upload-body .fm-group label{display:block;font-size:12px;font-weight:500;color:var(--text-2);margin-bottom:5px}
.upload-body .fm-group label .req{color:var(--danger);margin-left:2px}
.upload-body .fm-group input,.upload-body .fm-group select{width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-s);outline:none;transition:border .2s;font-family:var(--font);}
.upload-body .fm-group input:focus,.upload-body .fm-group select:focus{border-color:var(--primary)}
.upload-actions{display:flex;justify-content:flex-end;gap:8px;padding:16px 24px;border-top:1px solid var(--border-light);flex-shrink:0;}

/* Filter card style */
.filter-card{background:var(--bg-card);border-radius:var(--radius-l);box-shadow:var(--shadow-s);margin-bottom:16px;overflow:hidden}
.filter-card-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border-light);transition:background .15s}
.filter-card-header:hover{background:var(--bg-hover)}
.filter-card-title{font-size:13px;font-weight:600;color:var(--text-1);display:flex;align-items:center;gap:6px}
.filter-card-toggle{font-size:12px;color:var(--text-3);transition:transform .2s;display:inline-block}
.filter-card-toggle.collapsed{transform:rotate(-90deg)}
.filter-card-body{display:flex;flex-direction:column;gap:10px;padding:12px 16px;overflow:hidden;transition:max-height .3s,opacity .2s;max-height:500px;opacity:1}
.filter-card-body.collapsed{max-height:0;opacity:0;padding:0 16px;margin:0}

/* Tag filter category rows */
.tag-cat-row{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.tag-cat-row:last-child{margin-bottom:0}
.tag-cat-label{font-size:11px;font-weight:600;color:var(--text-2);min-width:56px;padding-top:8px;white-space:nowrap;flex-shrink:0}
.tag-cat-items{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap}

/* 消息弹窗 */
.msg-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.msg-modal-overlay.active{display:flex}
.msg-modal{background:#fff;border-radius:12px;width:400px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:slideUp .25s;text-align:center;overflow:hidden}
.msg-modal .msg-icon{font-size:48px;margin:24px 0 8px}
.msg-modal .msg-text{font-size:14px;color:var(--text-1);padding:0 24px 20px;line-height:1.6}
.msg-modal .msg-btn{padding:12px 0;font-size:14px;font-weight:500;color:var(--primary);cursor:pointer;border-top:1px solid var(--border-light);transition:background .15s}
.msg-modal .msg-btn:hover{background:var(--bg-hover)}

/* 上传结果弹窗 */
.result-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:2000;display:none;align-items:center;justify-content:center;animation:fadeIn .2s}
.result-modal-overlay.active{display:flex}
.result-modal{background:#fff;border-radius:12px;width:420px;max-width:90vw;box-shadow:0 12px 40px rgba(0,0,0,.2);animation:slideUp .25s;overflow:hidden}
.result-modal .result-header{padding:20px 24px 12px;text-align:center}
.result-modal .result-header .result-icon{font-size:48px;margin-bottom:8px}
.result-modal .result-header .result-title{font-size:16px;font-weight:600;color:var(--text-1)}
.result-modal .result-body{padding:0 24px 16px}
.result-modal .result-row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px;border-bottom:1px solid var(--border-light)}
.result-modal .result-row:last-child{border-bottom:none}
.result-modal .result-label{color:var(--text-2)}
.result-modal .result-value{font-weight:600}
.result-modal .result-value.success{color:var(--success)}
.result-modal .result-value.fail{color:var(--danger)}
.result-modal .result-fail-list{margin-top:8px;padding:8px 12px;background:var(--bg-page);border-radius:6px;font-size:11px;color:var(--danger);max-height:100px;overflow-y:auto;text-align:left}
.result-modal .result-actions{padding:16px 24px;border-top:1px solid var(--border-light);display:flex;justify-content:center}
</style>
</head>
<body>

<div class="content">
  <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn btn-primary" onclick="openUploadModal()">↑ 上传素材</button>
  </div>
  <div class="filter-card">
    <div class="filter-card-header" onclick="toggleFilterBar()">
      <div class="filter-card-title">🔍 基础筛选 <span style="font-size:11px;color:var(--text-3);font-weight:400;margin-left:8px" id="scCountInline"></span><span class="filter-card-toggle" id="filterBarToggle" style="margin-left:8px">▼</span></div>
    </div>
    <div class="filter-card-body" id="filterBar">
      <div style="display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end">
        <div class="filter-group">
          <label>名称搜索</label>
          <input type="text" id="nameFilter" placeholder="搜索素材名称..." oninput="applyFilter()">
        </div>
        <div class="filter-group">
          <label>类型</label>
          <select id="typeFilter" onchange="applyFilter()">
            <option>全部类型</option>
            <option>视频</option>
            <option>图片</option>
          </select>
        </div>
        <div class="filter-group">
          <label>来源</label>
          <select id="sourceFilter" onchange="applyFilter()">
            <option>全部来源</option>
            <option>自动入库</option>
            <option>手动上传</option>
          </select>
        </div>
        <div class="filter-group">
          <label>优化师</label>
          <div class="search-select" id="optimizerFilterWrap">
            <select id="optimizerFilter" onchange="applyFilter()">
              <option value="">全部</option>
              <option>崔志恒</option>
              <option>黄佩贤</option>
              <option>黎舒晴</option>
              <option>李雨航</option>
              <option>谭嘉颖</option>
              <option>林金维</option>
              <option>陈羽思</option>
              <option>叶首龙</option>
              <option>赖嘉俊</option>
              <option>戚嘉豪</option>
              <option>黄雄伟</option>
              <option>姚丰育</option>
              <option>卢俭聪</option>
            </select>
            <div class="select-arrow">▼</div>
            <div class="search-select-dropdown" id="optimizerFilterDropdown">
              <input type="text" class="search-input" placeholder="搜索优化师..." oninput="filterOptimizerOptions(this.value, 'optimizerFilter', 'optimizerFilterDropdown')">
            </div>
          </div>
        </div>
        <div class="filter-group">
          <label>设计师</label>
          <div class="search-select" id="designerFilterWrap">
            <select id="designerFilter" onchange="applyFilter()">
              <option value="">全部</option>
              <option>设计师A</option>
              <option>设计师B</option>
              <option>设计师C</option>
            </select>
            <div class="select-arrow">▼</div>
            <div class="search-select-dropdown" id="designerFilterDropdown">
              <input type="text" class="search-input" placeholder="搜索设计师..." oninput="filterOptimizerOptions(this.value, 'designerFilter', 'designerFilterDropdown')">
            </div>
          </div>
        </div>
        <div class="filter-group">
          <label>上传日期</label>
          <input type="date" id="dateStart" value="2026-06-01" onchange="applyFilter()">
          <span class="date-sep">~</span>
          <input type="date" id="dateEnd" value="2026-06-24" onchange="applyFilter()">
        </div>
        <div class="filter-group" style="margin-left:auto">
          <button class="btn" style="background:#fff;color:var(--text-2);border:1px solid var(--border)" onclick="resetFilter()">重置</button>
        </div>
      </div>
    </div>
  </div>

  <div class="filter-card">
    <div class="filter-card-header" onclick="toggleTagFilter()">
      <div class="filter-card-title">🏷️ 标签筛选 <span class="filter-card-toggle collapsed" id="tagFilterToggle">▶</span></div>
    </div>
    <div class="filter-card-body collapsed" id="tagFilterBar">
      <!-- 用户标签 -->
      <div class="tag-cat-row">
        <div class="tag-cat-label">用户标签</div>
        <div class="tag-cat-items">
          <div class="filter-group">
            <label>地区</label>
            <select id="filterUserRegion" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>年龄</label>
            <select id="filterUserAge" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>性别</label>
            <select id="filterUserGender" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
        </div>
      </div>
      <!-- 产品标签 -->
      <div class="tag-cat-row">
        <div class="tag-cat-label">产品标签</div>
        <div class="tag-cat-items">
          <div class="filter-group">
            <label>产品标签</label>
            <select id="filterProductTag" onchange="applyFilter()">
              <option value="">全部</option>
              <option>39元</option>
              <option>59元</option>
            </select>
          </div>
        </div>
      </div>
      <!-- 内容标签 -->
      <div class="tag-cat-row">
        <div class="tag-cat-label">内容标签</div>
        <div class="tag-cat-items">
          <div class="filter-group">
            <label>文案</label>
            <select id="filterContentWenan" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>宣传卖点</label>
            <select id="filterContentMaidian" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>场景</label>
            <select id="filterContentChangjing" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>对话</label>
            <select id="filterContentDuihua" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>口播</label>
            <select id="filterContentKoubo" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
          <div class="filter-group">
            <label>内容</label>
            <select id="filterContentNeirong" onchange="applyFilter()">
              <option value="">全部</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

function extractTagValues(tags) {
  var values = [];
  if (!tags) return values;
  if (Array.isArray(tags)) {
    for (var i = 0; i < tags.length; i++) values.push(tags[i]);
  } else {
    if (tags.userValue) values.push(tags.userValue);
    if (tags.product) values.push(tags.product);
    if (tags.content) {
      for (var k in tags.content) {
        if (tags.content.hasOwnProperty(k)) values.push(tags.content[k]);
      }
    }
  }
  return values;
}

    '</div>' +
    '<div style="display:flex;flex-wrap:wrap;gap:8px">';
  for (var k in CONTENT_TAG_CONFIG_ZHONGHOU) {
    if (!CONTENT_TAG_CONFIG_ZHONGHOU.hasOwnProperty(k)) continue;
    html += '<div style="flex:0 0 calc(33.33% - 6px);min-width:0">' +
      '<div style="font-size:11px;color:var(--text-3);margin-bottom:4px">' + k + '</div>' +
      '<select class="upload-content-tag" data-type="' + k + '" style="width:100%;padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:6px;outline:none;font-family:var(--font);background:#fff;color:var(--text-1);cursor:pointer">' +
        '<option value="">请选择</option>';
    for (var i = 0; i < CONTENT_TAG_CONFIG_ZHONGHOU[k].length; i++) {
      html += '<option>' + CONTENT_TAG_CONFIG_ZHONGHOU[k][i] + '</option>';
    }
    html += '</select></div>';
  }
  html += '</div>';
  wrap.innerHTML = html;
}

/* ========== 优化师下拉搜索功能 ========== */
function initSearchSelect(selectId, dropdownId) {
  var select = document.getElementById(selectId);
  var dropdown = document.getElementById(dropdownId);
  
  // 点击 select 时显示下拉
  select.addEventListener('click', function(e) {
    e.stopPropagation();
    dropdown.classList.toggle('show');
    if (dropdown.classList.contains('show')) {
      var input = dropdown.querySelector('.search-input');
      input.focus();
      filterOptimizerOptions(input.value, selectId, dropdownId);
    }
  });
  
  // 点击页面其他区域时关闭下拉
  document.addEventListener('click', function() {
    dropdown.classList.remove('show');
  });
  
  dropdown.addEventListener('click', function(e) {
    e.stopPropagation();
  });
}

function filterOptimizerOptions(keyword, selectId, dropdownId) {
  var select = document.getElementById(selectId);
  var dropdown = document.getElementById(dropdownId);
  var input = dropdown.querySelector('.search-input');
  var keyword = input.value.toLowerCase();
  
  // 清空下拉选项
  var existingOptions = dropdown.querySelectorAll('.option-item');
  existingOptions.forEach(function(item) { item.remove(); });
  
  // 获取 select 中的所有选项
  var options = select.options;
  var hasMatch = false;
  
  for (var i = 0; i < options.length; i++) {
    var text = options[i].text;
    if (text.toLowerCase().indexOf(keyword) !== -1 || options[i].value === "") {
      var item = document.createElement('div');
      item.className = 'option-item';
      if (options[i].selected) item.classList.add('selected');
      item.textContent = text;
      item.setAttribute('data-value', options[i].value);
      item.onclick = (function(idx) {
        return function() {
          select.selectedIndex = idx;
          dropdown.classList.remove('show');
          if (selectId === 'optimizerFilter') applyFilter();
        };
      })(i);
      dropdown.appendChild(item);
      if (text.toLowerCase().indexOf(keyword) !== -1) hasMatch = true;
    }
  }
}

// 初始化所有搜索下拉框
initSearchSelect('optimizerFilter', 'optimizerFilterDropdown');
initSearchSelect('uploadOptimizer', 'uploadOptimizerDropdown');

/* ========== 筛选和渲染 ========== */
function applyFilter() {
  renderGrid();
}

function resetFilter() {
  var el;
  el = document.getElementById("nameFilter"); if (el) el.value = "";
  el = document.getElementById("typeFilter"); if (el) el.value = "全部类型";
  el = document.getElementById("sourceFilter"); if (el) el.value = "全部来源";
  el = document.getElementById("optimizerFilter"); if (el) el.value = "";
  el = document.getElementById("designerFilter"); if (el) el.value = "";
  el = document.getElementById("dateStart"); if (el) el.value = "";
  el = document.getElementById("dateEnd"); if (el) el.value = "";
  el = document.getElementById("filterUserRegion"); if (el) el.value = "";
  el = document.getElementById("filterUserAge"); if (el) el.value = "";
  el = document.getElementById("filterUserGender"); if (el) el.value = "";
  el = document.getElementById("filterProductTag"); if (el) el.value = "";
  el = document.getElementById("filterContentWenan"); if (el) el.value = "";
  el = document.getElementById("filterContentMaidian"); if (el) el.value = "";
  el = document.getElementById("filterContentChangjing"); if (el) el.value = "";
  el = document.getElementById("filterContentDuihua"); if (el) el.value = "";
  el = document.getElementById("filterContentKoubo"); if (el) el.value = "";
  el = document.getElementById("filterContentNeirong"); if (el) el.value = "";
  renderGrid();
}

function getFilteredData() {
  var nameEl = document.getElementById("nameFilter");
  var typeEl = document.getElementById("typeFilter");
  var sourceEl = document.getElementById("sourceFilter");
  var optEl = document.getElementById("optimizerFilter");
  // 用户标签三个下拉
  var userRegionVal = document.getElementById("filterUserRegion").value;
  var userAgeVal = document.getElementById("filterUserAge").value;
  var userGenderVal = document.getElementById("filterUserGender").value;
  // 产品标签
  var productTagVal = document.getElementById("filterProductTag").value;
  // 内容标签按类型分拆
  var contentFilterEls = {
    "文案": document.getElementById("filterContentWenan"),
    "宣传卖点": document.getElementById("filterContentMaidian"),
    "场景": document.getElementById("filterContentChangjing"),
    "对话": document.getElementById("filterContentDuihua"),
    "口播": document.getElementById("filterContentKoubo"),
    "内容": document.getElementById("filterContentNeirong")
  };

  var nameKw = (nameEl && nameEl.value || "").trim().toLowerCase();
  var typeVal = (typeEl && typeEl.value) || "全部类型";
  var sourceVal = (sourceEl && sourceEl.value) || "全部来源";
  var optimizerVal = (optEl && optEl.value) || "";
  var designerVal = (document.getElementById("designerFilter") && document.getElementById("designerFilter").value) || "";
  // 收集内容标签筛选条件
  var contentFilterVals = {};
  for (var k in contentFilterEls) {
    if (contentFilterEls.hasOwnProperty(k) && contentFilterEls[k]) {
      var v = contentFilterEls[k].value;
      if (v) contentFilterVals[k] = v;
    }
  }

  var result = [];
  for (var i = 0; i < materialData.length; i++) {
    var m = materialData[i];
    if (nameKw && m.name.toLowerCase().indexOf(nameKw) === -1) continue;
    if (typeVal !== "全部类型" && m.type !== typeVal) continue;
    if (sourceVal !== "全部来源" && m.source !== sourceVal) continue;
    if (optimizerVal && m.optimizer !== optimizerVal) continue;
    if (designerVal && m.designer !== designerVal) continue;
    // 标签筛选
    var pass = true;
    if (m.tags) {
      // 用户标签筛选：按地区、年龄、性别分别筛选（OR关系）
      if (userRegionVal || userAgeVal || userGenderVal) {
        var userPass = false;
        if (userRegionVal && m.tags.userCategory === "地区" && m.tags.userValue === userRegionVal) userPass = true;
        if (userAgeVal && m.tags.userCategory === "年龄" && m.tags.userValue === userAgeVal) userPass = true;
        if (userGenderVal && m.tags.userCategory === "性别" && m.tags.userValue === userGenderVal) userPass = true;
        if (!userPass) { pass = false; }
      }
      // 产品标签筛选
      if (productTagVal && m.tags.product !== productTagVal) continue;
      // 内容标签按类型筛选
      if (m.tags.content) {
        for (var ck in contentFilterVals) {
          if (contentFilterVals.hasOwnProperty(ck) && m.tags.content[ck] !== contentFilterVals[ck]) {
            pass = false;
            break;
          }
        }
      } else if (Object.keys(contentFilterVals).length > 0) {
        pass = false; // 有内容标签筛选但素材没有标签
      }
    } else {
      // 素材没有tags，但有标签筛选条件
      if (userRegionVal || userAgeVal || userGenderVal || productTagVal || Object.keys(contentFilterVals).length > 0) pass = false;
    }
    if (!pass) continue;
    result.push(m);
  }
  return result;
}

function renderGrid() {
  try {
  var data = getFilteredData();
  var el = document.getElementById("gridView");
  if (!el) { console.error("gridView not found"); return; }
  if (data.length === 0) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📂</div><div class="title">暂无素材</div><div class="desc">试试调整筛选条件，或上传新素材</div></div>';
    return;
  }
  var html = "";
  for (var i = 0; i < data.length; i++) {
    var m = data[i];
    var bg = "linear-gradient(135deg,#1a1a2e,#16213e)";
    if (m.type === "图片") bg = "linear-gradient(135deg,#f093fb,#f5576c)";
    var badgeCls = m.type === "视频" ? "badge-video" : "badge-image";
    var sourceCls = m.source === "自动入库" ? "badge-auto" : "badge-manual";
    var tagValues = extractTagValues(m.tags);
    var tagPills = "";
    for (var t = 0; t < Math.min(tagValues.length, 5); t++) {
      tagPills += '<span class="tag-pill">' + tagValues[t] + '</span>';
    }
    if (tagValues.length > 5) tagPills += '<span class="tag-pill">+' + (tagValues.length - 5) + '</span>';
    html += '<div class="grid-card" onclick="openPreview(' + m.id + ')">' +
      '<div class="thumb" style="background:' + bg + '">' +
        '<div style="color:rgba(255,255,255,.3);font-size:36px">' + (m.type === "视频" ? "🎬" : "🖼️") + '</div>' +
        '<div class="play-overlay"><div class="play-btn">▶</div></div>' +
      '</div>' +
      '<div class="info">' +
        '<div class="name">' + m.name + '</div>' +
        '<div class="meta"><span class="badge ' + badgeCls + '">' + m.type + '</span>' +
        '<span class="badge ' + sourceCls + '">' + m.source + '</span></div>' +
        '<div style="margin-top:6px">' + tagPills + '</div>' +
      '</div></div>';
  }
  el.innerHTML = html;
  var countEl = document.getElementById("scCountInline");
  if (countEl) countEl.textContent = "共 " + data.length + " 个素材";
  } catch(e) {
    console.error("renderGrid error:", e);
    var el2 = document.getElementById("gridView");
    if (el2) el2.innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div class="title">渲染出错</div><div class="desc">' + e.message + '</div></div>';
  }
}

function openPreview(id) {
  var m = null;
  for (var i = 0; i < materialData.length; i++) {
    if (materialData[i].id === id) { m = materialData[i]; break; }
  }
  if (!m) return;
  document.getElementById("previewTitle").textContent = "预览：" + m.name;
  document.getElementById("detailName").textContent = m.name;
  document.getElementById("detailType").textContent = m.type;
  document.getElementById("detailBiz").textContent = m.biz;
  document.getElementById("detailChannel").textContent = m.channel;
  document.getElementById("detailOptimizer").textContent = m.optimizer;
  document.getElementById("detailDate").textContent = m.date;
  document.getElementById("detailSource").textContent = m.source;
  var tagHtml = "";
  var tagValues = extractTagValues(m.tags);
  if (tagValues.length) {
    for (var t = 0; t < tagValues.length; t++) {
      tagHtml += '<span class="tag-pill">' + tagValues[t] + '</span>';
    }
  } else {
    tagHtml = '<span style="color:var(--text-3);font-size:12px">无</span>';
  }
  document.getElementById("detailTags").innerHTML = tagHtml;
  
  var placeholder = document.getElementById("previewPlaceholder");
  var videoWrap = document.getElementById("previewVideoWrap");
  var imageWrap = document.getElementById("previewImageWrap");
  placeholder.style.display = "none";
  videoWrap.style.display = "none";
  imageWrap.style.display = "none";
  
  if (m.type === "视频") {
    videoWrap.style.display = "flex";
  } else {
    imageWrap.style.display = "flex";
  }
  
  document.getElementById("previewModal").classList.add("active");
  document.body.style.overflow = "hidden";
}

function closePreview() {
  document.getElementById("previewModal").classList.remove("active");
  document.body.style.overflow = "";
}

function openUploadModal() {
  document.getElementById("uploadOverlay").classList.add("active");
  document.body.style.overflow = "hidden";
  uploadSelectedFiles = [];
  document.getElementById("uploadFileList").style.display = "none";
  document.getElementById("uploadFileList").innerHTML = "";
  document.getElementById("uploadUserRegion").value = "";
  document.getElementById("uploadUserAge").value = "";
  document.getElementById("uploadUserGender").value = "";
  document.getElementById("uploadProductTag").value = "";
  renderUploadContentTagFields();
  // 重置素材类型显示
  document.getElementById("uploadTypeDisplay").innerHTML = '<span style="color:var(--text-3)">选择文件后自动识别</span>';
}

function closeUploadModal() {
  document.getElementById("uploadOverlay").classList.remove("active");
  document.body.style.overflow = "";
}

function handleUploadFileSelect(e) {
  var files = Array.from(e.target.files);
  uploadSelectedFiles = uploadSelectedFiles.concat(files);
  renderUploadFileList();
  // 根据第一个文件更新素材类型显示
  updateUploadTypeDisplay();
}

function renderUploadFileList() {
  var el = document.getElementById("uploadFileList");
  if (uploadSelectedFiles.length === 0) { el.style.display = "none"; return; }
  el.style.display = "flex";
  var tags = "";
  for (var i = 0; i < uploadSelectedFiles.length; i++) {
    tags += '<span style="background:#e8f1ff;padding:2px 6px;border-radius:4px;font-size:11px">' + uploadSelectedFiles[i].name + '</span>';
  }
  el.innerHTML = "📎 已选 " + uploadSelectedFiles.length + " 个文件：" + tags;
}

// 从文件扩展名检测素材类型（视频/图片）
function detectFileTypeFromName(fileName) {
  var ext = fileName.split('.').pop().toLowerCase();
  return (ext === 'png' || ext === 'jpg' || ext === 'jpeg' || ext === 'gif' || ext === 'webp' || ext === 'bmp') ? '图片' : '视频';
}

// 更新上传弹窗的素材类型显示
function updateUploadTypeDisplay() {
  var display = document.getElementById("uploadTypeDisplay");
  if (uploadSelectedFiles.length === 0) {
    display.innerHTML = '<span style="color:var(--text-3)">选择文件后自动识别</span>';
    return;
  }
  var fileType = detectFileTypeFromName(uploadSelectedFiles[0].name);
  var icon = fileType === '视频' ? '🎬' : '🖼️';
  display.innerHTML = icon + ' ' + fileType;
}

function submitUpload() {
  if (uploadSelectedFiles.length === 0) { showMsgModal("请先选择素材文件"); return; }
  var fileType = detectFileTypeFromName(uploadSelectedFiles[0].name);
  var biz = document.getElementById("uploadBiz").value;
  var channel = document.getElementById("uploadChannel").value;
  var optimizer = document.getElementById("uploadOptimizer").value || "未设置";
  var userRegion = document.getElementById("uploadUserRegion").value;
  var userAge = document.getElementById("uploadUserAge").value;
  var userGender = document.getElementById("uploadUserGender").value;
  var productTag = document.getElementById("uploadProductTag").value;
  if (!userRegion || !userAge || !userGender) { showMsgModal("请完整填写用户标签（地区、年龄、性别）"); return; }
  if (!productTag) { showMsgModal("请选择产品标签"); return; }
  var contentTags = {};
  // 视频素材标签为必配项，图片素材为选配项
  var isVideo = fileType === '视频';
  var ctgSelects = document.querySelectorAll(".upload-content-tag");
  for (var i = 0; i < ctgSelects.length; i++) {
    var s = ctgSelects[i];
    var k = s.getAttribute("data-type");
    var v = s.value;
    if (isVideo && !v) { showMsgModal("视频素材需填写完整的内容标签（" + k + "）"); return; }
    contentTags[k] = v;
  }
  var total = uploadSelectedFiles.length;
  var success = 0;
  var fail = 0;
  var failNames = [];
  for (var i = 0; i < uploadSelectedFiles.length; i++) {
    var file = uploadSelectedFiles[i];
    if (file.name.indexOf("fail") !== -1) {
      fail++;
      failNames.push(file.name);
    } else {
      success++;
      materialData.push({
        id: Date.now() + Math.random(),
        name: file.name,
        type: fileType,
        biz: biz,
        channel: channel,
        optimizer: optimizer,
        date: new Date().toISOString().slice(0,10),
        source: "手动上传",
        size: (file.size/1024/1024).toFixed(1) + "MB",
        tags: { userCategory: "地区", userValue: userRegion, product: productTag, content: contentTags }
      });
    }
  }
  renderGrid();
  closeUploadModal();
  uploadSelectedFiles = [];
  showUploadResultModal(total, success, fail, failNames);
}

/* 拖拽上传 */
var dropArea = document.getElementById("uploadFileDrop");
if (dropArea) {
  dropArea.addEventListener("dragover", function(e) { e.preventDefault(); dropArea.classList.add("drag-over"); });
  dropArea.addEventListener("dragleave", function(e) { e.preventDefault(); dropArea.classList.remove("drag-over"); });
  dropArea.addEventListener("drop", function(e) {
    e.preventDefault();
    dropArea.classList.remove("drag-over");
    var files = Array.from(e.dataTransfer.files);
    uploadSelectedFiles = uploadSelectedFiles.concat(files);
    renderUploadFileList();
  });
}

/* 点击弹窗外部关闭 */
document.getElementById("previewModal").addEventListener("click", function(e) {
  if (e.target === this) closePreview();
});
document.getElementById("uploadOverlay").addEventListener("click", function(e) {
  if (e.target === this) closeUploadModal();
});

/* 初始渲染 */
try { initTagFilters(); } catch(e) { console.error("initTagFilters failed:", e); }
try { renderUploadContentTagFields(); } catch(e) { console.error("renderUploadContentTagFields failed:", e); }
try { renderGrid(); } catch(e) { console.error("renderGrid init failed:", e); }
</script>
